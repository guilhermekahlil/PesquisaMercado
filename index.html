<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Segunda Opinião Radiológica — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --page:#0F1117; --card:#181C26; --inset:#1F2335; --hover:#252A3A;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --tx1:#F1EEE9; --tx2:#C8C3D0; --tx3:#8A8496; --tx4:#545060;
  --blue:#6B9FFF; --red:#FF6B6B; --purple:#A78BFA;
  --teal:#4ECDC4; --amber:#FBBF24; --pink:#F472B6; --green:#4ADE80;
  --warn:#F59E0B;
}
body{font-family:'DM Sans',sans-serif;background:var(--page);color:var(--tx2);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
.hdr{background:rgba(15,17,23,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 36px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-logo{display:flex;align-items:center;gap:12px}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:glow 2.5s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:1;box-shadow:0 0 8px var(--teal)}50%{opacity:.5;box-shadow:0 0 3px var(--teal)}}
.hdr-title{font-family:'Instrument Serif',serif;font-size:16px;color:var(--tx1);letter-spacing:.2px}
.hdr-sub{font-size:11px;color:var(--tx4);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:16px}
.hdr-badge{display:flex;align-items:center;gap:10px;background:var(--inset);border:1px solid var(--border2);border-radius:8px;padding:7px 16px}
.hdr-n{font-family:'Instrument Serif',serif;font-size:22px;color:var(--tx1);line-height:1}
.hdr-nlabel{font-size:11px;color:var(--tx3);margin-top:1px}
.hdr-sep{width:1px;height:22px;background:var(--border2)}
.hdr-live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx3)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:glow2 2s infinite}
@keyframes glow2{0%,100%{opacity:1}50%{opacity:.3}}
.btn-refresh{background:transparent;color:var(--tx3);border:1px solid var(--border2);border-radius:7px;padding:7px 16px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;letter-spacing:.3px}
.btn-refresh:hover{background:var(--inset);color:var(--tx1)}

/* ── GRID ── */
.grid{padding:28px 36px;display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;align-items:start}
.divider{grid-column:1/3;display:flex;align-items:center;gap:16px;padding:8px 0 4px}
.div-line{flex:1;height:1px;background:var(--border)}
.div-label{font-size:10px;color:var(--tx4);letter-spacing:2.5px;text-transform:uppercase;white-space:nowrap}

/* ── CARD ── */
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:24px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.block-badge{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:2px;font-family:'DM Sans',sans-serif}
.card-title{font-family:'Instrument Serif',serif;font-size:20px;color:var(--tx1);line-height:1.2}
.card-sub{font-size:12px;color:var(--tx4);margin-top:2px}

/* ── VEREDITO — headline automático por bloco ── */
.verdict{
  display:flex;align-items:center;gap:10px;
  border-radius:10px;padding:10px 14px;
  margin-bottom:16px;border:1px solid;
  font-size:13px;font-weight:500;
}
.verdict-icon{font-size:16px;flex-shrink:0;line-height:1}
.verdict-text{line-height:1.4}
.verdict-text strong{font-weight:600}
/* status variants */
.v-ok   {background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.25);color:#4ADE80}
.v-warn {background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:#F59E0B}
.v-info {background:rgba(107,159,255,.08);border-color:rgba(107,159,255,.25);color:#6B9FFF}
.v-hot  {background:rgba(255,107,107,.08);border-color:rgba(255,107,107,.25);color:#FF6B6B}

/* ── NARRATIVE ── */
.narrative{background:var(--inset);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--tx2);line-height:1.75;margin-bottom:18px;border-left:3px solid}
.narrative strong{color:var(--tx1);font-weight:600}

/* ── SECTION ── */
.sec{font-size:10px;letter-spacing:1.5px;color:var(--tx4);text-transform:uppercase;font-weight:500;margin:16px 0 10px}

/* ── KPI ROW ── */
.kpi-row{display:flex;gap:10px;margin-bottom:18px}
.kpi{flex:1;background:var(--inset);border-radius:10px;padding:14px 16px;border:1px solid var(--border)}
.kpi-label{font-size:10px;letter-spacing:1px;color:var(--tx4);text-transform:uppercase;margin-bottom:5px;font-weight:500}
.kpi-val{font-family:'Instrument Serif',serif;font-size:34px;line-height:1;color:var(--tx1)}
.kpi-sub{font-size:11px;color:var(--tx3);margin-top:3px}

/* ── BAR LIST ──
   Layout: rank | label | [track……] pct% n
   - align-items:flex-start para label 2 linhas
   - pct% em destaque, n como contagem secundária
   - sem truncar: line-clamp:2                        */
.bar-list{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:flex-start;gap:8px}
.bar-rank{font-size:10px;color:var(--tx4);width:20px;flex-shrink:0;text-align:right;padding-top:3px;font-weight:500}
.bar-label{
  font-size:12px;font-weight:500;color:var(--tx2);
  width:186px;min-width:186px;flex-shrink:0;text-align:right;
  white-space:normal;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.4;cursor:default;
}
.bar-right{flex:1;display:flex;align-items:center;gap:8px;min-width:0;padding-top:3px}
.bar-track{flex:1;height:8px;background:var(--inset);border-radius:4px;overflow:hidden;min-width:0}
.bar-fill{height:8px;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-meta{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:1px}
.bar-pct{font-size:12px;font-weight:600;color:var(--tx1);font-variant-numeric:tabular-nums;white-space:nowrap}
.bar-n{font-size:10px;color:var(--tx4);font-variant-numeric:tabular-nums}

/* ── QUOTES ── */
.quotes{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.quote{background:var(--inset);border-radius:8px;padding:12px 14px;font-size:12px;font-style:italic;color:var(--tx2);line-height:1.7;border-left:3px solid var(--border2)}
.quote strong{font-style:normal;color:var(--tx1);font-weight:500}

/* ── INSIGHT PILL ── */
.ipill{display:inline-flex;align-items:center;gap:8px;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:500;margin-bottom:16px;border:1px solid;max-width:100%}
.ipill-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── CONTACTS ── */
.contact-list{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.contact-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--inset);border:1px solid var(--border);transition:border-color .15s}
.contact-row:hover{border-color:var(--border2)}
.c-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-name{font-size:13px;font-weight:500;color:var(--tx1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-role{font-size:11px;color:var(--tx3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-action{flex-shrink:0}
.c-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(107,159,255,.12);color:var(--blue);
  border:1px solid rgba(107,159,255,.25);border-radius:6px;
  padding:5px 12px;font-size:11px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  text-decoration:none;transition:all .15s;white-space:nowrap;
}
.c-btn:hover{background:rgba(107,159,255,.22);border-color:rgba(107,159,255,.45)}

/* ── HEATMAP ── */
.heat-wrap{overflow-x:auto;margin-top:4px}
.heat-table{border-collapse:separate;border-spacing:4px;width:100%}
.heat-th{font-size:9px;letter-spacing:.8px;color:var(--tx3);text-transform:uppercase;text-align:center;padding:4px 6px;white-space:normal;line-height:1.35;max-width:90px;vertical-align:bottom}
.heat-td-label{font-size:11px;font-weight:500;color:var(--tx2);padding:4px 10px 4px 0;white-space:normal;line-height:1.35;min-width:130px;max-width:170px;vertical-align:middle;cursor:default}
.heat-cell{border-radius:6px;padding:5px 8px;font-size:11px;font-weight:600;text-align:center;min-width:34px;display:inline-block}
.heat-legend{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:10px;color:var(--tx4)}
.heat-grad{width:80px;height:6px;border-radius:3px;background:linear-gradient(to right,var(--inset),rgba(251,191,36,.8));border:1px solid var(--border)}

/* ── VW CHART ── */
.vw-cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.vw-mini-card{background:var(--inset);border-radius:8px;padding:10px 12px;border-left:3px solid}
.vw-mini-label{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--tx4);margin-bottom:3px}
.vw-mini-val{font-size:17px;font-weight:600;line-height:1}
.vw-mini-desc{font-size:10px;color:var(--tx4);margin-top:2px}
.vw-zone-bar{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.22);border-radius:8px;padding:9px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:12px;color:#4ADE80}
.vw-zone-bar strong{font-weight:600}
.vw-chart-wrap{position:relative;width:100%;height:180px;margin-bottom:8px}
.vw-tooltip-box{position:absolute;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:11px;pointer-events:none;display:none;z-index:10;min-width:160px}
.vw-tip-price{font-weight:600;color:var(--tx1);font-size:13px;margin-bottom:5px}
.vw-tip-row{display:flex;align-items:center;gap:6px;color:var(--tx2);margin-top:3px}
.vw-tip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.vw-legend-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px}
.vw-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx3);cursor:pointer;padding:3px 6px;border-radius:4px;transition:background .15s;user-select:none}
.vw-leg-item:hover{background:var(--inset)}
.vw-leg-swatch{width:18px;height:3px;border-radius:2px;flex-shrink:0}

/* ── AMOSTRA WARN ── */
.sample-warn{display:flex;align-items:center;gap:8px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:8px 12px;font-size:11px;color:#F59E0B;margin-bottom:16px}

/* ── STATES ── */
.state-center{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.state-title{font-family:'Instrument Serif',serif;font-size:18px;color:var(--tx2)}
.state-sub{font-size:12px;color:var(--tx4)}
.state-spinner{width:32px;height:32px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--blue);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
.footer{padding:14px 36px;display:flex;justify-content:space-between;font-size:10px;color:var(--tx4);letter-spacing:1px;text-transform:uppercase;border-top:1px solid var(--border);background:var(--page)}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--page)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div id="app">
  <div class="state-center">
    <div class="state-spinner"></div>
    <div class="state-title">Carregando dados</div>
    <div class="state-sub">Conectando ao Google Sheets…</div>
  </div>
</div>
<script>
const SHEET  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIqIG3zTLcnsJsXQ3BLpAEdOyE4qbwdPptdX5K2oK2iko11XhNDQnK4Ea3kU0j1IUJG5I7WaMD5F4y/pub?output=csv";
const REFRESH = 60000;
let lastUpdate = null;

// ── PALETA POR BLOCO ──────────────────────────────────────────────
const B = {
  1:{accent:'var(--blue)',  badge:'rgba(107,159,255,.15)',badgeTx:'#6B9FFF'},
  2:{accent:'var(--red)',   badge:'rgba(255,107,107,.15)',badgeTx:'#FF6B6B'},
  3:{accent:'var(--purple)',badge:'rgba(167,139,250,.15)',badgeTx:'#A78BFA'},
  4:{accent:'var(--teal)', badge:'rgba(78,205,196,.15)', badgeTx:'#4ECDC4'},
  5:{accent:'var(--amber)',badge:'rgba(251,191,36,.15)', badgeTx:'#FBBF24'},
  6:{accent:'var(--pink)', badge:'rgba(244,114,182,.15)',badgeTx:'#F472B6'},
};

// ─────────────────────────────────────────────────────────────────
// FILTRO DE RESPOSTAS TESTE
// Respostas cujo campo "descrição/relato" bater com esses padrões
// serão removidas dos relatos diretos (mas contadas no n total).
// ─────────────────────────────────────────────────────────────────
const TESTE_PATTERNS = [/^teste$/i,/^x$/i,/^\s*$/,/^(test|aaa|bbb|zzz|abc)$/i];
function isTeste(s){ return TESTE_PATTERNS.some(p => p.test((s||'').trim())); }

// ─────────────────────────────────────────────────────────────────
// COLUNAS MULTI-SELECT — parte do texto da pergunta no Forms
// ─────────────────────────────────────────────────────────────────
const MULTI_SELECT_KW = [
  'tipos de exame',
  'costuma fazer',
  'dúvida sobre um exame',
  'diante da dúvida',
];

// ── UTILS ─────────────────────────────────────────────────────────
function col(H,kw){const i=H.findIndex(h=>h&&h.toLowerCase().includes(kw.toLowerCase()));return i>=0?i:-1}
function colOr(H,...kws){for(const k of kws){const i=col(H,k);if(i>=0)return i}return -1}
function trunc(s,max){if(!s)return'';return s.length>max?s.slice(0,max-1)+'…':s}
function pct(n,total){return total>0?Math.round(n/total*100):0}
function hexRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}

// Separa por vírgula ignorando vírgulas dentro de ()
function splitParens(str){
  const parts=[];let d=0,cur='';
  for(const ch of str){
    if(ch==='('){d++;cur+=ch}
    else if(ch===')'){d--;cur+=ch}
    else if(ch===','&&d===0){const t=cur.trim();if(t)parts.push(t);cur=''}
    else{cur+=ch}
  }
  const t=cur.trim();if(t)parts.push(t);return parts;
}

// Limpa lixo de fim de item
function limpar(s){
  return s.replace(/[,;\s]+$/,'').replace(/\s*\(etc\.?\)\s*$/i,'').replace(/,?\s*etc\.?\s*$/i,'').trim();
}
const LIXO=/^(etc\.?|e\.?t\.?c\.?|outros?|other|\s*[-–]\s*)$/i;

function countBase(records,idx,isMulti){
  if(idx<0)return[];
  const m={};
  records.forEach(r=>{
    const v=(r[idx]||'').trim();if(!v)return;
    let parts;
    if(isMulti){
      parts=v.includes(';')
        ?v.split(';').map(limpar).filter(s=>s.length>1&&!LIXO.test(s))
        :splitParens(v).map(limpar).filter(s=>s.length>1&&!LIXO.test(s));
    }else{parts=[v]}
    parts.forEach(k=>{if(k.length>1)m[k]=(m[k]||0)+1});
  });
  return Object.entries(m).map(([name,val])=>({name,val})).sort((a,b)=>b.val-a.val);
}
const countVals      = (R,i)=>countBase(R,i,false);
const countValsMulti = (R,i)=>countBase(R,i,true);
const normProf       = s=>(s||'').trim();

// ── PARSE ─────────────────────────────────────────────────────────
function parse(csvData){
  const rows=csvData.data;
  if(!rows||rows.length<2)return null;
  const H=rows[0];
  const R=rows.slice(1).filter(r=>r.some(c=>c&&c.trim()));
  if(!R.length)return null;

  const I={
    profile: colOr(H,'perfil médico','perfil'),
    env:     colOr(H,'ambiente'),
    grad:    colOr(H,'graduação','preparou'),
    freq:    colOr(H,'inseguro','frequência'),
    exams:   colOr(H,'tipos de exame'),
    behav:   colOr(H,'costuma fazer','dúvida sobre um exame'),
    worry:   colOr(H,'preocupação'),
    caseImp: colOr(H,'opinião adicional','conduta'),
    action:  colOr(H,'diante da dúvida'),
    desc:    colOr(H,'brevemente','Descreva'),
    vw1:     colOr(H,'tão barato'),
    vw2:     colOr(H,'barato, mas','barato'),
    vw3:     colOr(H,'caro, mas'),
    vw4:     colOr(H,'tão caro'),
    band:    colOr(H,'faixa melhor','faixa'),
    deadline:colOr(H,'prazo'),
    urgency: colOr(H,'pagar a mais','urgente'),
    model:   colOr(H,'cobrança'),
    intent:  colOr(H,'disponível hoje','plataforma estivesse'),
    indisp:  colOr(H,'indispensável'),
    interv:  colOr(H,'entrevista'),
    contact: colOr(H,'contato'),
  };

  const n=R.length;

  // Perfis
  const pm={};
  R.forEach(r=>{const k=normProf(r[I.profile]||'');if(k)pm[k]=(pm[k]||0)+1});
  const profiles=Object.entries(pm).map(([name,val])=>({name,val})).sort((a,b)=>b.val-a.val);

  const envs      = countVals(R,I.env);
  const gradNums  = R.map(r=>parseFloat(r[I.grad])).filter(v=>!isNaN(v));
  const avgGrad   = gradNums.length?(gradNums.reduce((a,b)=>a+b)/gradNums.length).toFixed(1):null;
  const freqHigh  = R.filter(r=>{const v=(r[I.freq]||'').toLowerCase();return v.includes('semana')||v.includes('diariamente')||v.includes('diário')}).length;
  const caseYes   = R.filter(r=>(r[I.caseImp]||'').toLowerCase().includes('sim')).length;
  const exams     = countValsMulti(R,I.exams);
  const worries   = R.map(r=>(r[I.worry]||'').trim()).filter(s=>s&&!isTeste(s));
  const behaviors = countValsMulti(R,I.behav);
  const actions   = countValsMulti(R,I.action);

  // Relatos — filtra testes
  const stories=R.map(r=>({desc:(r[I.desc]||'').trim(),prof:normProf(r[I.profile]||'')}))
    .filter(s=>s.desc&&!isTeste(s.desc));

  const vw1=R.map(r=>parseFloat(r[I.vw1])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
  const vw2=R.map(r=>parseFloat(r[I.vw2])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
  const vw3=R.map(r=>parseFloat(r[I.vw3])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
  const vw4=R.map(r=>parseFloat(r[I.vw4])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);

  const optPrice=(vw2.length&&vw3.length)
    ?'R$'+Math.round((vw2[Math.floor(vw2.length/2)]+vw3[Math.floor(vw3.length/2)])/2)
    :null;

  const vwCurve=[];
  if(vw1.length&&vw4.length){
    const all=[...vw1,...vw2,...vw3,...vw4].sort((a,b)=>a-b);
    const mn=all[0],mx=all[all.length-1],step=Math.max(5,Math.round((mx-mn)/12));
    for(let p=mn;p<=mx;p+=step){
      vwCurve.push({p,
        d1:pct(vw1.filter(v=>v>=p).length,vw1.length),
        d2:pct(vw2.filter(v=>v<=p).length,vw2.length),
        d3:pct(vw3.filter(v=>v<=p).length,vw3.length),
        d4:pct(vw4.filter(v=>v<=p).length,vw4.length),
      });
    }
  }

  const bands     =countVals(R,I.band);
  const deadlines =countVals(R,I.deadline);
  const urgencies =countVals(R,I.urgency);
  const models    =countVals(R,I.model);
  const intentions=countVals(R,I.intent);

  // Filtra indispensáveis-teste
  const indispens=R.map(r=>(r[I.indisp]||'').trim()).filter(s=>s&&!isTeste(s));

  // Cross: perfil × frequência (texto completo)
  const cross={};
  R.forEach(r=>{
    const p=normProf(r[I.profile]||'');
    const f=(r[I.freq]||'').trim();
    if(!p||!f)return;
    if(!cross[p])cross[p]={};
    cross[p][f]=(cross[p][f]||0)+1;
  });

  const contacts=R
    .filter(r=>(r[I.interv]||'').toLowerCase().includes('sim'))
    .map(r=>({contact:(r[I.contact]||'').trim(),profile:normProf(r[I.profile]||'')}))
    .filter(c=>c.contact);

  return{n,profiles,envs,avgGrad,freqHigh,caseYes,exams,worries,behaviors,actions,stories,vw1,vw2,vw3,vw4,vwCurve,optPrice,bands,deadlines,urgencies,models,cross,intentions,indispens,contacts};
}

// Veredito automático por bloco
function verdict(type,icon,html){
  const cls={ok:'v-ok',warn:'v-warn',info:'v-info',hot:'v-hot'}[type]||'v-info';
  return`<div class="verdict ${cls}"><div class="verdict-icon">${icon}</div><div class="verdict-text">${html}</div></div>`;

// barList — label completo 2 linhas, % em destaque, n secundário
function barList(items,accentHex,total,max){
  if(!items||!items.length)return empty();
  const top    =items.slice(0,7);
  const maxVal =max||Math.max(...top.map(i=>i.val),1);
  const allTied=top.length>1&&top.every(i=>i.val===top[0].val);
  const base   =total||maxVal; // para % correto relativo ao n total
  return`<div class="bar-list">${top.map((item,idx)=>{
    const opacity  =idx===0?1:idx===1?.6:.35;
    const fill     =accentHex.startsWith('#')?hexRgba(accentHex,opacity):accentHex;
    const barW     =allTied?62:Math.max(Math.round(item.val/maxVal*100),4);
    const itemPct  =pct(item.val,base);
    return`<div class="bar-row">
      <div class="bar-rank">${String(idx+1).padStart(2,'0')}</div>
      <div class="bar-label" title="${item.name}">${item.name}</div>
      <div class="bar-right">
        <div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${fill}"></div></div>
        <div class="bar-meta">
          <div class="bar-pct">${itemPct}<span style="font-size:10px;font-weight:400;color:var(--tx3)">%</span></div>
          <div class="bar-n">${item.val}${allTied&&idx===0?' · empate':''}</div>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// vwChart — Chart.js interativo com zona e tooltip
let _vwCID=0;
function vwChart(curve){
  if(!curve.length)return'';
  const prices=curve.map(p=>p.p);
  const d1=curve.map(p=>p.d1),d2=curve.map(p=>p.d2),d3=curve.map(p=>p.d3),d4=curve.map(p=>p.d4);
  let optP=prices[Math.floor(prices.length/2)];
  for(let i=1;i<prices.length;i++){
    if(d2[i-1]<=d3[i-1]&&d2[i]>=d3[i]){
      const t=(d3[i-1]-d2[i-1])/((d2[i]-d2[i-1])-(d3[i]-d3[i-1])||1);
      optP=Math.round(prices[i-1]+t*(prices[i]-prices[i-1]));break;
    }
  }
  const minOk=prices.find((_,i)=>d2[i]>=50)||prices[0];
  const maxOk=[...prices].reverse().find((_,i)=>[...d3].reverse()[i]>=50)||prices[prices.length-1];
  const cid='vwc'+(++_vwCID),tid='vwt'+_vwCID,lid='vwl'+_vwCID;
  setTimeout(()=>{
    const go=()=>_bVW(cid,tid,lid,prices,d1,d2,d3,d4,minOk,maxOk,optP);
    if(typeof Chart==='undefined'){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';s.onload=go;document.head.appendChild(s);}else go();
  },80);
  return '<div class="vw-cards-row">'
    +'<div class="vw-mini-card" style="border-color:#FF6B6B"><div class="vw-mini-label">Barato demais</div><div class="vw-mini-val" style="color:#FF6B6B">R$'+prices[0]+'</div><div class="vw-mini-desc">Gera desconfiança</div></div>'
    +'<div class="vw-mini-card" style="border-color:#4ADE80"><div class="vw-mini-label">Mínimo aceitável</div><div class="vw-mini-val" style="color:#4ADE80">R$'+minOk+'</div><div class="vw-mini-desc">Começa a parecer justo</div></div>'
    +'<div class="vw-mini-card" style="border-color:#FBBF24"><div class="vw-mini-label">Caro mas paga</div><div class="vw-mini-val" style="color:#FBBF24">R$'+maxOk+'</div><div class="vw-mini-desc">Limite superior tolerado</div></div>'
    +'<div class="vw-mini-card" style="border-color:#F87171"><div class="vw-mini-label">Caro demais</div><div class="vw-mini-val" style="color:#F87171">R$'+prices[prices.length-1]+'</div><div class="vw-mini-desc">Perde conversão</div></div>'
    +'</div>'
    +'<div class="vw-zone-bar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 2.5"/></svg>'
    +' <span>Zona ideal: <strong>R$'+minOk+' – R$'+maxOk+'</strong> &nbsp;·&nbsp; Ponto ótimo: <strong>R$'+optP+'</strong></span></div>'
    +'<div style="position:relative">'
    +'<div class="vw-tooltip-box" id="'+tid+'">'
    +'<div class="vw-tip-price" id="'+tid+'p"></div>'
    +'<div class="vw-tip-row"><div class="vw-tip-dot" style="background:#FF6B6B"></div><span id="'+tid+'d1"></span></div>'
    +'<div class="vw-tip-row"><div class="vw-tip-dot" style="background:#4ADE80"></div><span id="'+tid+'d2"></span></div>'
    +'<div class="vw-tip-row"><div class="vw-tip-dot" style="background:#FBBF24"></div><span id="'+tid+'d3"></span></div>'
    +'<div class="vw-tip-row"><div class="vw-tip-dot" style="background:#F87171"></div><span id="'+tid+'d4"></span></div>'
    +'</div>'
    +'<div class="vw-chart-wrap"><canvas id="'+cid+'" role="img" aria-label="Curva Van Westendorp">Sensibilidade ao preço.</canvas></div></div>'
    +'<div class="vw-legend-row" id="'+lid+'">'
    +'<div class="vw-leg-item" data-idx="0"><div class="vw-leg-swatch" style="background:#FF6B6B"></div>Barato demais</div>'
    +'<div class="vw-leg-item" data-idx="1"><div class="vw-leg-swatch" style="background:#4ADE80"></div>Aceitável</div>'
    +'<div class="vw-leg-item" data-idx="2"><div class="vw-leg-swatch" style="background:#FBBF24"></div>Caro mas paga</div>'
    +'<div class="vw-leg-item" data-idx="3"><div class="vw-leg-swatch" style="background:#F87171"></div>Caro demais</div>'
    +'</div>';
}
function _bVW(cid,tid,lid,prices,d1,d2,d3,d4,minOk,maxOk,optP){
  const el=document.getElementById(cid);if(!el)return;
  const gc='rgba(255,255,255,0.07)',tc='#545060';
  const mi=prices.indexOf(minOk),ma=prices.indexOf(maxOk),oi=prices.indexOf(optP);
  const zp={id:'zp'+cid,
    beforeDraw(c){const{ctx,chartArea:a,scales:{x}}=c;if(!a)return;
      const x1=x.getPixelForValue(mi<0?0:mi),x2=x.getPixelForValue(ma<0?prices.length-1:ma);
      ctx.save();ctx.fillStyle='rgba(74,222,128,0.07)';ctx.fillRect(x1,a.top,x2-x1,a.bottom-a.top);
      ctx.strokeStyle='rgba(74,222,128,0.2)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
      [x1,x2].forEach(xp=>{ctx.beginPath();ctx.moveTo(xp,a.top);ctx.lineTo(xp,a.bottom);ctx.stroke()});
      ctx.setLineDash([]);ctx.restore();},
    afterDraw(c){const{ctx,chartArea:a,scales:{x}}=c;if(!a||oi<0)return;
      const xo=x.getPixelForValue(oi);
      ctx.save();ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(xo,a.top);ctx.lineTo(xo,a.bottom);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='500 10px DM Sans,sans-serif';
      ctx.textAlign='center';ctx.fillText('R$'+optP+' otimo',xo,a.top-4);ctx.restore();}
  };
  const ch=new Chart(el,{type:'line',plugins:[zp],
    data:{labels:prices,datasets:[
      {label:'Barato demais',data:d1,borderColor:'#FF6B6B',borderWidth:2,borderDash:[6,3],pointRadius:3,pointHoverRadius:5,pointBackgroundColor:'#FF6B6B',tension:.4,fill:false},
      {label:'Aceitável',    data:d2,borderColor:'#4ADE80',borderWidth:2.5,pointRadius:3,pointHoverRadius:5,pointBackgroundColor:'#4ADE80',tension:.4,fill:false},
      {label:'Caro mas paga',data:d3,borderColor:'#FBBF24',borderWidth:2.5,pointRadius:3,pointHoverRadius:5,pointBackgroundColor:'#FBBF24',tension:.4,fill:false},
      {label:'Caro demais',  data:d4,borderColor:'#F87171',borderWidth:2,borderDash:[6,3],pointRadius:3,pointHoverRadius:5,pointBackgroundColor:'#F87171',tension:.4,fill:false},
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{enabled:false,external(ctx){
        const tip=document.getElementById(tid);if(!tip)return;
        if(ctx.tooltip.opacity===0){tip.style.display='none';return}
        const dp=ctx.tooltip.dataPoints;if(!dp||!dp.length)return;
        const i=dp[0].dataIndex;
        document.getElementById(tid+'p').textContent='R$'+prices[i];
        document.getElementById(tid+'d1').textContent='Barato demais: '+d1[i]+'% desconfiariam';
        document.getElementById(tid+'d2').textContent='Aceitável: '+d2[i]+'% pagariam';
        document.getElementById(tid+'d3').textContent='Caro mas paga: '+d3[i]+'% tolerariam';
        document.getElementById(tid+'d4').textContent='Caro demais: '+d4[i]+'% desistiriam';
        const wr=tip.parentElement.getBoundingClientRect();
        let lx=ctx.tooltip.caretX+10;if(lx+170>wr.width)lx=ctx.tooltip.caretX-180;
        tip.style.left=lx+'px';tip.style.top=Math.max(0,ctx.tooltip.caretY-50)+'px';tip.style.display='block';
      }}},
      scales:{
        x:{ticks:{color:tc,font:{size:10},callback:(_,i)=>'R$'+prices[i]},grid:{color:gc}},
        y:{min:0,max:100,ticks:{color:tc,font:{size:10},callback:v=>v+'%'},grid:{color:gc},
           title:{display:true,text:'% dos medicos',color:tc,font:{size:10}}}
      }
    }
  });
  document.querySelectorAll('#'+lid+' .vw-leg-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const i=+el.dataset.idx,m=ch.getDatasetMeta(i);
      m.hidden=!m.hidden;el.style.opacity=m.hidden?.35:1;ch.update();
    });
  });
}

// heatMap — células vazias cinzas, com legenda de cor
function heatMap(cross){
  const profs=Object.keys(cross);
  const freqs=[...new Set(Object.values(cross).flatMap(v=>Object.keys(v)))];
  if(!profs.length)return empty();
  const allVals=profs.flatMap(p=>freqs.map(f=>cross[p][f]||0));
  const globalMax=Math.max(...allVals,1);
  return`<div class="heat-wrap"><table class="heat-table">
    <thead><tr>
      <th style="text-align:left;min-width:130px;padding-bottom:6px"></th>
      ${freqs.map(f=>`<th class="heat-th" title="${f}">${f}</th>`).join('')}
    </tr></thead>
    <tbody>${profs.map(prof=>`<tr>
      <td class="heat-td-label" title="${prof}">${prof}</td>
      ${freqs.map(f=>{
        const v=cross[prof][f]||0;
        if(!v)return`<td style="text-align:center"><div class="heat-cell" style="background:var(--inset);color:var(--tx4)">—</div></td>`;
        const o=v/globalMax;
        const bg=`rgba(251,191,36,${(o*.7+.15).toFixed(2)})`;
        const tc=o>.45?'#0F1117':'var(--tx2)';
        return`<td style="text-align:center"><div class="heat-cell" style="background:${bg};color:${tc}">${v}</div></td>`;
      }).join('')}
    </tr>`).join('')}</tbody>
  </table>
  <div class="heat-legend">
    <span>Frequência:</span>
    <div class="heat-grad"></div>
    <span>Baixa → Alta</span>
  </div></div>`;
}

        <div><div class="card-title">Quem é o cliente ideal?</div><div class="card-sub">Cruzamentos — onde concentrar energia</div></div>
      </div>
      <div class="narrative" style="border-color:${B[5].accent}">
        Células <strong>mais iluminadas</strong> = perfil com insegurança mais frequente.
        Priorize esses grupos para aquisição. Células <strong>cinzas</strong> = sem resposta nessa combinação.
      </div>
      <div class="sec">Perfil × Frequência de insegurança</div>
      ${heatMap(d.cross)}
      <div class="sec">Prazo aceitável para receber a resposta</div>
      ${barList(d.deadlines,'#FBBF24',d.n)}
    </div>

    <!-- ══ 6 ══ -->
    <div class="card">
      <div class="card-head">
        <div class="block-badge" style="background:${B[6].badge};color:${B[6].badgeTx}">6</div>
        <div><div class="card-title">O que fazer agora?</div><div class="card-sub">Pipeline e ação imediata</div></div>
      </div>
      ${v5}
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;background:var(--inset);border-radius:12px;padding:16px 20px;border:1px solid var(--border)">
        <div style="font-family:'Instrument Serif',serif;font-size:60px;line-height:1;letter-spacing:-2px;color:${B[6].accent};flex-shrink:0">${d.contacts.length}</div>
        <div style="border-left:1px solid var(--border2);padding-left:16px">
          <div style="font-size:22px;font-weight:600;color:var(--tx1);line-height:1">${contactPct}%</div>
          <div style="font-size:12px;color:var(--tx3);margin-top:3px">do total toparam conversar</div>
        </div>
      </div>
      <div class="sec">Intenção de uso</div>
      ${barList(d.intentions,'#F472B6',d.n)}
      ${d.indispens.length?`<div class="sec">O que tornaria o produto indispensável</div>
      <div class="quotes">${d.indispens.slice(0,3).map(w=>`<div class="quote">"${trunc(w,180)}"</div>`).join('')}</div>`:''}
      ${d.contacts.length?`
      <div class="sec">Pipeline de entrevistas — entre em contato</div>
      <div class="contact-list">${d.contacts.slice(0,8).map((c,i)=>{
                const isPhone=/^[\d\s\(\)\-\+]+$/.test(c.contact.trim());
        const isEmail=c.contact.includes('@');
        const href=isPhone?'https://wa.me/55'+c.contact.replace(/\D/g,''):isEmail?'mailto:'+c.contact:'#';
        const personSVG='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>';
        const waSVG='<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';
        const mailSVG='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>';
        const btnIcon=isPhone?waSVG:mailSVG;
        const btnLabel=isPhone?'WhatsApp':'E-mail';
        const bg=isPhone?'rgba(37,211,102,.12)':'rgba(107,159,255,.12)';
        const bd=isPhone?'rgba(37,211,102,.28)':'rgba(107,159,255,.25)';
        const tx=isPhone?'#25D366':'#6B9FFF';
        return '<div class="contact-row">'
          +'<div class="c-avatar" style="background:'+B[6].badge+';color:'+B[6].badgeTx+'">'+personSVG+'</div>'
          +'<div class="c-info">'
          +'<div class="c-name">'+c.contact+'</div>'
          +'<div class="c-role">'+c.profile+'</div>'
          +'</div>'
          +'<div class="c-action">'
          +'<a class="c-btn" href="'+href+'" target="_blank" style="background:'+bg+';color:'+tx+';border-color:'+bd+'">'+btnIcon+' '+btnLabel+'</a>'
          +'</div>'
          +'</div>'; lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Segunda Opinião Radiológica — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --page:#0F1117; --card:#181C26; --inset:#1F2335; --hover:#252A3A;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --tx1:#F1EEE9; --tx2:#C8C3D0; --tx3:#8A8496; --tx4:#545060;
  --blue:#6B9FFF; --red:#FF6B6B; --purple:#A78BFA;
  --teal:#4ECDC4; --amber:#FBBF24; --pink:#F472B6; --green:#4ADE80;
  --warn:#F59E0B;
}
body{font-family:'DM Sans',sans-serif;background:var(--page);color:var(--tx2);min-height:100vh;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;min-height:100vh}

/* ── HEADER ── */
.hdr{background:rgba(15,17,23,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 36px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-logo{display:flex;align-items:center;gap:12px}
.hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:glow 2.5s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:1;box-shadow:0 0 8px var(--teal)}50%{opacity:.5;box-shadow:0 0 3px var(--teal)}}
.hdr-title{font-family:'Instrument Serif',serif;font-size:16px;color:var(--tx1);letter-spacing:.2px}
.hdr-sub{font-size:11px;color:var(--tx4);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:16px}
.hdr-badge{display:flex;align-items:center;gap:10px;background:var(--inset);border:1px solid var(--border2);border-radius:8px;padding:7px 16px}
.hdr-n{font-family:'Instrument Serif',serif;font-size:22px;color:var(--tx1);line-height:1}
.hdr-nlabel{font-size:11px;color:var(--tx3);margin-top:1px}
.hdr-sep{width:1px;height:22px;background:var(--border2)}
.hdr-live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx3)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:glow2 2s infinite}
@keyframes glow2{0%,100%{opacity:1}50%{opacity:.3}}
.btn-refresh{background:transparent;color:var(--tx3);border:1px solid var(--border2);border-radius:7px;padding:7px 16px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;letter-spacing:.3px}
.btn-refresh:hover{background:var(--inset);color:var(--tx1)}

/* ── GRID ── */
.grid{padding:28px 36px;display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;align-items:start}
.divider{grid-column:1/3;display:flex;align-items:center;gap:16px;padding:8px 0 4px}
.div-line{flex:1;height:1px;background:var(--border)}
.div-label{font-size:10px;color:var(--tx4);letter-spacing:2.5px;text-transform:uppercase;white-space:nowrap}

/* ── CARD ── */
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:24px;transition:border-color .2s}
.card:hover{border-color:var(--border2)}
.card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.block-badge{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:2px;font-family:'DM Sans',sans-serif}
.card-title{font-family:'Instrument Serif',serif;font-size:20px;color:var(--tx1);line-height:1.2}
.card-sub{font-size:12px;color:var(--tx4);margin-top:2px}

/* ── VEREDITO — headline automático por bloco ── */
.verdict{
  display:flex;align-items:center;gap:10px;
  border-radius:10px;padding:10px 14px;
  margin-bottom:16px;border:1px solid;
  font-size:13px;font-weight:500;
}
.verdict-icon{font-size:16px;flex-shrink:0;line-height:1}
.verdict-text{line-height:1.4}
.verdict-text strong{font-weight:600}
/* status variants */
.v-ok   {background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.25);color:#4ADE80}
.v-warn {background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:#F59E0B}
.v-info {background:rgba(107,159,255,.08);border-color:rgba(107,159,255,.25);color:#6B9FFF}
.v-hot  {background:rgba(255,107,107,.08);border-color:rgba(255,107,107,.25);color:#FF6B6B}

/* ── NARRATIVE ── */
.narrative{background:var(--inset);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--tx2);line-height:1.75;margin-bottom:18px;border-left:3px solid}
.narrative strong{color:var(--tx1);font-weight:600}

/* ── SECTION ── */
.sec{font-size:10px;letter-spacing:1.5px;color:var(--tx4);text-transform:uppercase;font-weight:500;margin:16px 0 10px}

/* ── KPI ROW ── */
.kpi-row{display:flex;gap:10px;margin-bottom:18px}
.kpi{flex:1;background:var(--inset);border-radius:10px;padding:14px 16px;border:1px solid var(--border)}
.kpi-label{font-size:10px;letter-spacing:1px;color:var(--tx4);text-transform:uppercase;margin-bottom:5px;font-weight:500}
.kpi-val{font-family:'Instrument Serif',serif;font-size:34px;line-height:1;color:var(--tx1)}
.kpi-sub{font-size:11px;color:var(--tx3);margin-top:3px}

/* ── BAR LIST ──
   Layout: rank | label | [track……] pct% n
   - align-items:flex-start para label 2 linhas
   - pct% em destaque, n como contagem secundária
   - sem truncar: line-clamp:2                        */
.bar-list{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:flex-start;gap:8px}
.bar-rank{font-size:10px;color:var(--tx4);width:20px;flex-shrink:0;text-align:right;padding-top:3px;font-weight:500}
.bar-label{
  font-size:12px;font-weight:500;color:var(--tx2);
  width:186px;min-width:186px;flex-shrink:0;text-align:right;
  white-space:normal;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;line-height:1.4;cursor:default;
}
.bar-right{flex:1;display:flex;align-items:center;gap:8px;min-width:0;padding-top:3px}
.bar-track{flex:1;height:8px;background:var(--inset);border-radius:4px;overflow:hidden;min-width:0}
.bar-fill{height:8px;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-meta{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:1px}
.bar-pct{font-size:12px;font-weight:600;color:var(--tx1);font-variant-numeric:tabular-nums;white-space:nowrap}
.bar-n{font-size:10px;color:var(--tx4);font-variant-numeric:tabular-nums}

/* ── QUOTES ── */
.quotes{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.quote{background:var(--inset);border-radius:8px;padding:12px 14px;font-size:12px;font-style:italic;color:var(--tx2);line-height:1.7;border-left:3px solid var(--border2)}
.quote strong{font-style:normal;color:var(--tx1);font-weight:500}

/* ── INSIGHT PILL ── */
.ipill{display:inline-flex;align-items:center;gap:8px;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:500;margin-bottom:16px;border:1px solid;max-width:100%}
.ipill-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── CONTACTS ── */
.contact-list{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.contact-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--inset);border:1px solid var(--border);transition:border-color .15s}
.contact-row:hover{border-color:var(--border2)}
.c-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-name{font-size:13px;font-weight:500;color:var(--tx1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-role{font-size:11px;color:var(--tx3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-action{flex-shrink:0}
.c-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(107,159,255,.12);color:var(--blue);
  border:1px solid rgba(107,159,255,.25);border-radius:6px;
  padding:5px 12px;font-size:11px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  text-decoration:none;transition:all .15s;white-space:nowrap;
}
.c-btn:hover{background:rgba(107,159,255,.22);border-color:rgba(107,159,255,.45)}

/* ── HEATMAP ── */
.heat-wrap{overflow-x:auto;margin-top:4px}
.heat-table{border-collapse:separate;border-spacing:4px;width:100%}
.heat-th{font-size:9px;letter-spacing:.8px;color:var(--tx3);text-transform:uppercase;text-align:center;padding:4px 6px;white-space:normal;line-height:1.35;max-width:90px;vertical-align:bottom}
.heat-td-label{font-size:11px;font-weight:500;color:var(--tx2);padding:4px 10px 4px 0;white-space:normal;line-height:1.35;min-width:130px;max-width:170px;vertical-align:middle;cursor:default}
.heat-cell{border-radius:6px;padding:5px 8px;font-size:11px;font-weight:600;text-align:center;min-width:34px;display:inline-block}
.heat-legend{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:10px;color:var(--tx4)}
.heat-grad{width:80px;height:6px;border-radius:3px;background:linear-gradient(to right,var(--inset),rgba(251,191,36,.8));border:1px solid var(--border)}

/* ── VW CHART ── */
.vw-cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.vw-mini-card{background:var(--inset);border-radius:8px;padding:10px 12px;border-left:3px solid}
.vw-mini-label{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--tx4);margin-bottom:3px}
.vw-mini-val{font-size:17px;font-weight:600;line-height:1}
.vw-mini-desc{font-size:10px;color:var(--tx4);margin-top:2px}
.vw-zone-bar{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.22);border-radius:8px;padding:9px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:12px;color:#4ADE80}
.vw-zone-bar strong{font-weight:600}
.vw-chart-wrap{position:relative;width:100%;height:180px;margin-bottom:8px}
.vw-tooltip-box{position:absolute;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:11px;pointer-events:none;display:none;z-index:10;min-width:160px}
.vw-tip-price{font-weight:600;color:var(--tx1);font-size:13px;margin-bottom:5px}
.vw-tip-row{display:flex;align-items:center;gap:6px;color:var(--tx2);margin-top:3px}
.vw-tip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.vw-legend-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px}
.vw-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx3);cursor:pointer;padding:3px 6px;border-radius:4px;transition:background .15s;user-select:none}
.vw-leg-item:hover{background:var(--inset)}
.vw-leg-swatch{width:18px;height:3px;border-radius:2px;flex-shrink:0}

/* ── AMOSTRA WARN ── */
.sample-warn{display:flex;align-items:center;gap:8px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:8px 12px;font-size:11px;color:#F59E0B;margin-bottom:16px}

/* ── STATES ── */
.state-center{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.state-title{font-family:'Instrument Serif',serif;font-size:18px;color:var(--tx2)}
.state-sub{font-size:12px;color:var(--tx4)}
.state-spinner{width:32px;height:32px;border-radius:50%;border:2px solid var(--border2);border-top-color:var(--blue);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
.footer{padding:14px 36px;display:flex;justify-content:space-between;font-size:10px;color:var(--tx4);letter-spacing:1px;text-transform:uppercase;border-top:1px solid var(--border);background:var(--page)}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--page)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div id="app">
  <div class="state-center">
    <div class="state-spinner"></div>
    <div class="state-title">Carregando dados</div>
    <div class="state-sub">Conectando ao Google Sheets…</div>
  </div>
</div>
<script>
const SHEET  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIqIG3zTLcnsJsXQ3BLpAEdOyE4qbwdPptdX5K2oK2iko11XhNDQnK4Ea3kU0j1IUJG5I7WaMD5F4y/pub?output=csv";
const REFRESH = 60000;
let lastUpdate = null;

// ── PALETA POR BLOCO ──────────────────────────────────────────────
const B = {
  1:{accent:'var(--blue)',  badge:'rgba(107,159,255,.15)',badgeTx:'#6B9FFF'},
  2:{accent:'var(--red)',   badge:'rgba(255,107,107,.15)',badgeTx:'#FF6B6B'},
  3:{accent:'var(--purple)',badge:'rgba(167,139,250,.15)',badgeTx:'#A78BFA'},
  4:{accent:'var(--teal)', badge:'rgba(78,205,196,.15)', badgeTx:'#4ECDC4'},
  5:{accent:'var(--amber)',badge:'rgba(251,191,36,.15)', badgeTx:'#FBBF24'},
  6:{accent:'var(--pink)', badge:'rgba(244,114,182,.15)',badgeTx:'#F472B6'},
};

// ─────────────────────────────────────────────────────────────────
// FILTRO DE RESPOSTAS TESTE
// Respostas cujo campo "descrição/relato" bater com esses padrões
// serão removidas dos relatos diretos (mas contadas no n total).
// ─────────────────────────────────────────────────────────────────
const TESTE_PATTERNS = [/^teste$/i,/^x$/i,/^\s*$/,/^(test|aaa|bbb|zzz|abc)$/i];
function isTeste(s){ return TESTE_PATTERNS.some(p => p.test((s||'').trim())); }

// ─────────────────────────────────────────────────────────────────
// COLUNAS MULTI-SELECT — parte do texto da pergunta no Forms
// ─────────────────────────────────────────────────────────────────
const MULTI_SELECT_KW = [
  'tipos de exame',
  'costuma fazer',
  'dúvida sobre um exame',
  'diante da dúvida',
];

// ── UTILS ─────────────────────────────────────────────────────────
function col(H,kw){const i=H.findIndex(h=>h&&h.toLowerCase().includes(kw.toLowerCase()));return i>=0?i:-1}
function colOr(H,...kws){for(const k of kws){const i=col(H,k);if(i>=0)return i}return -1}
function trunc(s,max){if(!s)return'';return s.length>max?s.slice(0,max-1)+'…':s}
function pct(n,total){return total>0?Math.round(n/total*100):0}
function hexRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}

// Separa por vírgula ignorando vírgulas dentro de ()
function splitParens(str){
  const parts=[];let d=0,cur='';
  for(const ch of str){
    if(ch==='('){d++;cur+=ch}
    else if(ch===')'){d--;cur+=ch}
    else if(ch===','&&d===0){const t=cur.trim();if(t)parts.push(t);cur=''}
    else{cur+=ch}
  }
  const t=cur.trim();if(t)parts.push(t);return parts;
}

// Limpa lixo de fim de item
function limpar(s){
  return s.replace(/[,;\s]+$/,'').replace(/\s*\(etc\.?\)\s*$/i,'').replace(/,?\s*etc\.?\s*$/i,'').trim();
}
const LIXO=/^(etc\.?|e\.?t\.?c\.?|outros?|other|\s*[-–]\s*)$/i;

function countBase(records,idx,isMulti){
  if(idx<0)return[];
  const m={};
  records.forEach(r=>{
    const v=(r[idx]||'').trim();if(!v)return;
    let parts;
    if(isMulti){
      parts=v.includes(';')
        ?v.split(';').map(limpar).filter(s=>s.length>1&&!LIXO.test(s))
        :splitParens(v).map(limpar).filter(s=>s.length>1&&!LIXO.test(s));
    }else{parts=[v]}
    parts.forEach(k=>{if(k.length>1)m[k]=(m[k]||0)+1});
  });
  return Object.entries(m).map(([name,val])=>({name,val})).sort((a,b)=>b.val-a.val);
}
const countVals      = (R,i)=>countBase(R,i,false);
const countValsMulti = (R,i)=>countBase(R,i,true);
const normProf       = s=>(s||'').trim();

// ── PARSE ─────────────────────────────────────────────────────────
function parse(csvData){
  const rows=csvData.data;
  if(!rows||rows.length<2)return null;
  const H=rows[0];
  const R=rows.slice(1).filter(r=>r.some(c=>c&&c.trim()));
  if(!R.length)return null;

  const I={
    profile: colOr(H,'perfil médico','perfil'),
    env:     colOr(H,'ambiente'),
    grad:    colOr(H,'graduação','preparou'),
    freq:    colOr(H,'inseguro','frequência'),
    exams:   colOr(H,'tipos de exame'),
    behav:   colOr(H,'costuma fazer','dúvida sobre um exame'),
    worry:   colOr(H,'preocupação'),
    caseImp: colOr(H,'opinião adicional','conduta'),
    action:  colOr(H,'diante da dúvida'),
    desc:    colOr(H,'brevemente','Descreva'),
    vw1:     colOr(H,'tão barato'),
    vw2:     colOr(H,'barato, mas','barato'),
    vw3:     colOr(H,'caro, mas'),
    vw4:     colOr(H,'tão caro'),
    band:    colOr(H,'faixa melhor','faixa'),
    deadline:colOr(H,'prazo'),
    urgency: colOr(H,'pagar a mais','urgente'),
    model:   colOr(H,'cobrança'),
    intent:  colOr(H,'disponível hoje','plataforma estivesse'),
    indisp:  colOr(H,'indispensável'),
    interv:  colOr(H,'entrevista'),
    contact: colOr(H,'contato'),
  };

  const n=R.length;

  // Perfis
  const pm={};
  R.forEach(r=>{const k=normProf(r[I.profile]||'');if(k)pm[k]=(pm[k]||0)+1});
  const profiles=Object.entries(pm).map(([name,val])=>({name,val})).sort((a,b)=>b.val-a.val);

  const envs      = countVals(R,I.env);
  const gradNums  = R.map(r=>parseFloat(r[I.grad])).filter(v=>!isNaN(v));
  const avgGrad   = gradNums.length?(gradNums.reduce((a,b)=>a+b)/gradNums.length).toFixed(1):null;
  const freqHigh  = R.filter(r=>{const v=(r[I.freq]||'').toLowerCase();return v.includes('semana')||v.includes('diariamente')||v.includes('diário')}).length;
  const caseYes   = R.filter(r=>(r[I.caseImp]||'').toLowerCase().includes('sim')).length;
  const exams     = countValsMulti(R,I.exams);
  const worries   = R.map(r=>(r[I.worry]||'').trim()).filter(s=>s&&!isTeste(s));
  const behaviors = countValsMulti(R,I.behav);
  const actions   = countValsMulti(R,I.action);

  // Relatos — filtra testes
  const stories=R.map(r=>({desc:(r[I.desc]||'').trim(),prof:normProf(r[I.profile]||'')}))
    .filter(s=>s.desc&&!isTeste(s.desc));

  const vw1=R.map(r=>parseFloat(r[I.vw1])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
  const vw2=R.map(r=>parseFloat(r[I.vw2])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
  const vw3=R.map(r=>parseFloat(r[I.vw3])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
  const vw4=R.map(r=>parseFloat(r[I.vw4])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);

  const optPrice=(vw2.length&&vw3.length)
    ?'R$'+Math.round((vw2[Math.floor(vw2.length/2)]+vw3[Math.floor(vw3.length/2)])/2)
    :null;

  const vwCurve=[];
  if(vw1.length&&vw4.length){
    const all=[...vw1,...vw2,...vw3,...vw4].sort((a,b)=>a-b);
    const mn=all[0],mx=all[all.length-1],step=Math.max(5,Math.round((mx-mn)/12));
    for(let p=mn;p<=mx;p+=step){
      vwCurve.push({p,
        d1:pct(vw1.filter(v=>v>=p).length,vw1.length),
        d2:pct(vw2.filter(v=>v<=p).length,vw2.length),
        d3:pct(vw3.filter(v=>v<=p).length,vw3.length),
        d4:pct(vw4.filter(v=>v<=p).length,vw4.length),
      });
    }
  }

  const bands     =countVals(R,I.band);
  const deadlines =countVals(R,I.deadline);
  const urgencies =countVals(R,I.urgency);
  const models    =countVals(R,I.model);
  const intentions=countVals(R,I.intent);

  // Filtra indispensáveis-teste
  const indispens=R.map(r=>(r[I.indisp]||'').trim()).filter(s=>s&&!isTeste(s));

  // Cross: perfil × frequência (texto completo)
  const cross={};
  R.forEach(r=>{
    const p=normProf(r[I.profile]||'');
    const f=(r[I.freq]||'').trim();
    if(!p||!f)return;
    if(!cross[p])cross[p]={};
    cross[p][f]=(cross[p][f]||0)+1;
  });

  const contacts=R
    .filter(r=>(r[I.interv]||'').toLowerCase().includes('sim'))
    .map(r=>({contact:(r[I.contact]||'').trim(),profile:normProf(r[I.profile]||'')}))
    .filter(c=>c.contact);

  return{n,profiles,envs,avgGrad,freqHigh,caseYes,exams,worries,behaviors,actions,stories,vw1,vw2,vw3,vw4,vwCurve,optPrice,bands,deadlines,urgencies,models,cross,intentions,indispens,contacts};
}

function empty(){return`<div style="padding:10px 0;font-size:12px;font-style:italic;color:var(--tx4)">Sem dados suficientes ainda</div>`}

// Aviso de amostra pequena
function sampleWarn(n){
  if(n>=10)return'';
  return`<div class="sample-warn">
    <span>⚠</span>
    <span>Amostra pequena (n=${n}) — os percentuais são indicativos. Continue coletando para maior confiança.</span>
  </div>`;
}

// Veredito automático por bloco
function verdict(type,icon,html){
  const cls={ok:'v-ok',warn:'v-warn',info:'v-info',hot:'v-hot'}[type]||'v-info';
  return`<div class="verdict ${cls}"><div class="verdict-icon">${icon}</div><div class="verdict-text">${html}</div></div>`;
}

// barList — label completo 2 linhas, % em destaque, n secundário
function barList(items,accentHex,total,max){
  if(!items||!items.length)return empty();
  const top    =items.slice(0,7);
  const maxVal =max||Math.max(...top.map(i=>i.val),1);
  const allTied=top.length>1&&top.every(i=>i.val===top[0].val);
  const base   =total||maxVal; // para % correto relativo ao n total
  return`<div class="bar-list">${top.map((item,idx)=>{
    const opacity  =idx===0?1:idx===1?.6:.35;
    const fill     =accentHex.startsWith('#')?hexRgba(accentHex,opacity):accentHex;
    const barW     =allTied?62:Math.max(Math.round(item.val/maxVal*100),4);
    const itemPct  =pct(item.val,base);
    return`<div class="bar-row">
      <div class="bar-rank">${String(idx+1).padStart(2,'0')}</div>
      <div class="bar-label" title="${item.name}">${item.name}</div>
      <div class="bar-right">
        <div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${fill}"></div></div>
        <div class="bar-meta">
          <div class="bar-pct">${itemPct}<span style="font-size:10px;font-weight:400;color:var(--tx3)">%</span></div>
          <div class="bar-n">${item.val}${allTied&&idx===0?' · empate':''}</div>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// vwChart — Chart.js interativo com zona e tooltip
let _vwCID=0;
function vwChart(curve){
  if(!curve.length)return'';
  const prices=curve.map(p=>p.p);
  const d1=curve.map(p=>p.d1),d2=curve.map(p=>p.d2),d3=curve.map(p=>p.d3),d4=curve.map(p=>p.d4);
  let optP=prices[Math.floor(prices.length/2)];
  for(let i=1;i<prices.length;i++){
    if(d2[i-1]<=d3[i-1]&&d2[i]>=d3[i]){
      const t=(d3[i-1]-d2[i-1])/((d2[i]-d2[i-1])-(d3[i]-d3[i-1])||1);
      optP=Math.round(prices[i-1]+t*(prices[i]-prices[i-1]));break;
    }
  }
  const minOk=prices.find((_,i)=>d2[i]>=50)||prices[0];
  const maxOk=[...prices].reverse().find((_,i)=>[...d3].reverse()[i]>=50)||prices[prices.length-1];
  const cid='vwc'+(++_vwCID),tid='vwt'+_vwCID,lid='vwl'+_vwCID;
  setTimeout(()=>{
    const go=()=>_bVW(cid,tid,lid,prices,d1,d2,d3,d4,minOk,maxOk,optP);
    if(typeof Chart==='undefined'){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';s.onload=go;document.head.appendChild(s);}else go();
  },80);
  return '<div class="vw-cards-row">'
    +'<div class="vw-mini-card" style="border-color:#FF6B6B"><div class="vw-mini-label">Barato demais</div><div class="vw-mini-val" style="color:#FF6B6B">R$'+prices[0]+'</div><div class="vw-mini-desc">Gera desconfiança</div></div>'
    +'<div class="vw-mini-card" style="border-color:#4ADE80"><div class="vw-mini-label">Mínimo aceitável</div><div class="vw-mini-val" style="color:#4ADE80">R$'+minOk+'</div><div class="vw-mini-desc">Começa a parecer justo</div></div>'
    +'<div class="vw-mini-card" style="border-color:#FBBF24"><div class="vw-mini-label">Caro mas paga</div><div class="vw-mini-val" style="color:#FBBF24">R$'+maxOk+'</div><div class="vw-mini-desc">Limite superior tolerado</div></div>'
    +'<div class="vw-mini-card" style="border-color:#F87171"><div class="vw-mini-label">Caro demais</div><div class="vw-mini-val" style="color:#F87171">R$'+prices[prices.length-1]+'</div><div class="vw-mini-desc">Perde conversão</div></div>'
    +'</div>'
    +'<div class="vw-zone-bar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 2.5"/></svg>'
    +' <span>Zona ideal: <strong>R$'+minOk+' – R$'+maxOk+'</strong> &nbsp;·&nbsp; Ponto ótimo: <strong>R$'+optP+'</strong></span></div>'
    +'<div style="position:relative">'
    +'<div class="vw-tooltip-box" id="'+tid+'">'
    +'<div class="vw-tip-price" id="'+tid+'p"></div>'
    +'<div class="vw-tip-row"><div class="vw-tip-dot" style="background:#FF6B6B"></div><span id="'+tid+'d1"></span></div>'
    +'<div class="vw-tip-row"><div class="vw-tip-dot" style="background:#4ADE80"></div><span id="'+tid+'d2"></span></div>'
    +'<div class="vw-tip-row"><div class="vw-tip-dot" style="background:#FBBF24"></div><span id="'+tid+'d3"></span></div>'
    +'<div class="vw-tip-row"><div class="vw-tip-dot" style="background:#F87171"></div><span id="'+tid+'d4"></span></div>'
    +'</div>'
    +'<div class="vw-chart-wrap"><canvas id="'+cid+'" role="img" aria-label="Curva Van Westendorp">Sensibilidade ao preço.</canvas></div></div>'
    +'<div class="vw-legend-row" id="'+lid+'">'
    +'<div class="vw-leg-item" data-idx="0"><div class="vw-leg-swatch" style="background:#FF6B6B"></div>Barato demais</div>'
    +'<div class="vw-leg-item" data-idx="1"><div class="vw-leg-swatch" style="background:#4ADE80"></div>Aceitável</div>'
    +'<div class="vw-leg-item" data-idx="2"><div class="vw-leg-swatch" style="background:#FBBF24"></div>Caro mas paga</div>'
    +'<div class="vw-leg-item" data-idx="3"><div class="vw-leg-swatch" style="background:#F87171"></div>Caro demais</div>'
    +'</div>';
}
function _bVW(cid,tid,lid,prices,d1,d2,d3,d4,minOk,maxOk,optP){
  const el=document.getElementById(cid);if(!el)return;
  const gc='rgba(255,255,255,0.07)',tc='#545060';
  const mi=prices.indexOf(minOk),ma=prices.indexOf(maxOk),oi=prices.indexOf(optP);
  const zp={id:'zp'+cid,
    beforeDraw(c){const{ctx,chartArea:a,scales:{x}}=c;if(!a)return;
      const x1=x.getPixelForValue(mi<0?0:mi),x2=x.getPixelForValue(ma<0?prices.length-1:ma);
      ctx.save();ctx.fillStyle='rgba(74,222,128,0.07)';ctx.fillRect(x1,a.top,x2-x1,a.bottom-a.top);
      ctx.strokeStyle='rgba(74,222,128,0.2)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
      [x1,x2].forEach(xp=>{ctx.beginPath();ctx.moveTo(xp,a.top);ctx.lineTo(xp,a.bottom);ctx.stroke()});
      ctx.setLineDash([]);ctx.restore();},
    afterDraw(c){const{ctx,chartArea:a,scales:{x}}=c;if(!a||oi<0)return;
      const xo=x.getPixelForValue(oi);
      ctx.save();ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(xo,a.top);ctx.lineTo(xo,a.bottom);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='500 10px DM Sans,sans-serif';
      ctx.textAlign='center';ctx.fillText('R$'+optP+' otimo',xo,a.top-4);ctx.restore();}
  };
  const ch=new Chart(el,{type:'line',plugins:[zp],
    data:{labels:prices,datasets:[
      {label:'Barato demais',data:d1,borderColor:'#FF6B6B',borderWidth:2,borderDash:[6,3],pointRadius:3,pointHoverRadius:5,pointBackgroundColor:'#FF6B6B',tension:.4,fill:false},
      {label:'Aceitável',    data:d2,borderColor:'#4ADE80',borderWidth:2.5,pointRadius:3,pointHoverRadius:5,pointBackgroundColor:'#4ADE80',tension:.4,fill:false},
      {label:'Caro mas paga',data:d3,borderColor:'#FBBF24',borderWidth:2.5,pointRadius:3,pointHoverRadius:5,pointBackgroundColor:'#FBBF24',tension:.4,fill:false},
      {label:'Caro demais',  data:d4,borderColor:'#F87171',borderWidth:2,borderDash:[6,3],pointRadius:3,pointHoverRadius:5,pointBackgroundColor:'#F87171',tension:.4,fill:false},
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{enabled:false,external(ctx){
        const tip=document.getElementById(tid);if(!tip)return;
        if(ctx.tooltip.opacity===0){tip.style.display='none';return}
        const dp=ctx.tooltip.dataPoints;if(!dp||!dp.length)return;
        const i=dp[0].dataIndex;
        document.getElementById(tid+'p').textContent='R$'+prices[i];
        document.getElementById(tid+'d1').textContent='Barato demais: '+d1[i]+'% desconfiariam';
        document.getElementById(tid+'d2').textContent='Aceitável: '+d2[i]+'% pagariam';
        document.getElementById(tid+'d3').textContent='Caro mas paga: '+d3[i]+'% tolerariam';
        document.getElementById(tid+'d4').textContent='Caro demais: '+d4[i]+'% desistiriam';
        const wr=tip.parentElement.getBoundingClientRect();
        let lx=ctx.tooltip.caretX+10;if(lx+170>wr.width)lx=ctx.tooltip.caretX-180;
        tip.style.left=lx+'px';tip.style.top=Math.max(0,ctx.tooltip.caretY-50)+'px';tip.style.display='block';
      }}},
      scales:{
        x:{ticks:{color:tc,font:{size:10},callback:(_,i)=>'R$'+prices[i]},grid:{color:gc}},
        y:{min:0,max:100,ticks:{color:tc,font:{size:10},callback:v=>v+'%'},grid:{color:gc},
           title:{display:true,text:'% dos medicos',color:tc,font:{size:10}}}
      }
    }
  });
  document.querySelectorAll('#'+lid+' .vw-leg-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const i=+el.dataset.idx,m=ch.getDatasetMeta(i);
      m.hidden=!m.hidden;el.style.opacity=m.hidden?.35:1;ch.update();
    });
  });
}

// heatMap — células vazias cinzas, com legenda de cor
function heatMap(cross){
  const profs=Object.keys(cross);
  const freqs=[...new Set(Object.values(cross).flatMap(v=>Object.keys(v)))];
  if(!profs.length)return empty();
  const allVals=profs.flatMap(p=>freqs.map(f=>cross[p][f]||0));
  const globalMax=Math.max(...allVals,1);
  return`<div class="heat-wrap"><table class="heat-table">
    <thead><tr>
      <th style="text-align:left;min-width:130px;padding-bottom:6px"></th>
      ${freqs.map(f=>`<th class="heat-th" title="${f}">${f}</th>`).join('')}
    </tr></thead>
    <tbody>${profs.map(prof=>`<tr>
      <td class="heat-td-label" title="${prof}">${prof}</td>
      ${freqs.map(f=>{
        const v=cross[prof][f]||0;
        if(!v)return`<td style="text-align:center"><div class="heat-cell" style="background:var(--inset);color:var(--tx4)">—</div></td>`;
        const o=v/globalMax;
        const bg=`rgba(251,191,36,${(o*.7+.15).toFixed(2)})`;
        const tc=o>.45?'#0F1117':'var(--tx2)';
        return`<td style="text-align:center"><div class="heat-cell" style="background:${bg};color:${tc}">${v}</div></td>`;
      }).join('')}
    </tr>`).join('')}</tbody>
  </table>
  <div class="heat-legend">
    <span>Frequência:</span>
    <div class="heat-grad"></div>
    <span>Baixa → Alta</span>
  </div></div>`;
}

      </div>
      ${v1}
      ${sampleWarn(d.n)}
      <div class="narrative" style="border-color:${B[1].accent}">
        <strong>${d.n} ${d.n===1?'médico respondeu':'médicos responderam'}</strong>.
        Perfil dominante: <strong>${d.profiles[0]?.name||'—'}</strong>${d.envs[0]?`. Atuando principalmente em <strong>${d.envs[0].name}</strong>`:'.'}.
      </div>
      <div class="sec">Perfil médico</div>
      ${barList(d.profiles,'#6B9FFF',d.n)}
      <div class="sec">Ambiente de atuação</div>
      ${barList(d.envs,'#6B9FFF',d.n)}
    </div>

    <!-- ══ 2 ══ -->
    <div class="card">
      <div class="card-head">
        <div class="block-badge" style="background:${B[2].badge};color:${B[2].badgeTx}">2</div>
        <div><div class="card-title">A dor é real?</div><div class="card-sub">Se o número for alto, o projeto faz sentido</div></div>
      </div>
      ${v2}
      <div class="kpi-row">
        <div class="kpi">
          <div class="kpi-label">Insegurança frequente</div>
          <div class="kpi-val" style="color:${B[2].accent}">${freqPct}<span style="font-size:18px;color:var(--tx3)">%</span></div>
          <div class="kpi-sub">toda semana ou diariamente</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Caso com impacto real</div>
          <div class="kpi-val" style="color:var(--green)">${casePct}<span style="font-size:18px;color:var(--tx3)">%</span></div>
          <div class="kpi-sub">afetou conduta diretamente</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Nota da graduação</div>
          <div class="kpi-val" style="color:var(--amber)">${d.avgGrad||'—'}<span style="font-size:18px;color:var(--tx3)">/5</span></div>
          <div class="kpi-sub">quanto a faculdade preparou</div>
        </div>
      </div>
      <div class="sec">Exames que mais geram dúvida</div>
      ${barList(d.exams,'#FF6B6B',d.n)}
      ${d.worries.length?`<div class="sec">Em suas próprias palavras</div>
      <div class="quotes">${d.worries.slice(0,3).map(w=>`<div class="quote">"${trunc(w,180)}"</div>`).join('')}</div>`:''}
    </div>

    <div class="divider"><div class="div-line"></div><div class="div-label">Como resolvem hoje</div><div class="div-line"></div></div>

    <!-- ══ 3 ══ -->
    <div class="card">
      <div class="card-head">
        <div class="block-badge" style="background:${B[3].badge};color:${B[3].badgeTx}">3</div>
        <div><div class="card-title">O que fazem hoje?</div><div class="card-sub">Concorrência real — o mais marcado é quem você precisa superar</div></div>
      </div>
      ${v3}
      ${d.behaviors.length?`<div class="ipill" style="background:${B[3].badge};color:${B[3].badgeTx};border-color:rgba(167,139,250,.3)">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4" fill="currentColor" opacity=".4"/><circle cx="6" cy="6" r="2" fill="currentColor"/></svg>
        <span class="ipill-text">Concorrente #1 — ${d.behaviors[0].name}</span>
      </div>`:''}
      <div class="sec">Como resolvem a dúvida</div>
      ${barList(d.behaviors,'#A78BFA',d.n)}
      ${d.actions.length?`<div class="sec">O que fizeram no último caso real</div>${barList(d.actions,'#A78BFA',d.n)}`:''}
      ${d.stories.length?`<div class="sec">Relatos diretos</div>
      <div class="quotes">${d.stories.slice(0,2).map(s=>`<div class="quote"><strong>${trunc(s.prof,28)}:</strong> "${trunc(s.desc,140)}"</div>`).join('')}</div>`:''}
    </div>

    <!-- ══ 4 ══ -->
    <div class="card">
      <div class="card-head">
        <div class="block-badge" style="background:${B[4].badge};color:${B[4].badgeTx}">4</div>
        <div><div class="card-title">Quanto pagam?</div><div class="card-sub">Defina o preço antes de lançar</div></div>
      </div>
      ${v4}
      ${d.optPrice?`<div class="kpi-row">
        <div class="kpi">
          <div class="kpi-label">Preço ótimo</div>
          <div class="kpi-val" style="color:${B[4].accent}">${d.optPrice}</div>
          <div class="kpi-sub">por caso · Van Westendorp</div>
        </div>
        ${d.bands[0]?`<div class="kpi">
          <div class="kpi-label">Faixa preferida</div>
          <div class="kpi-val" style="font-size:20px;color:var(--amber)">${trunc(d.bands[0].name,16)}</div>
          <div class="kpi-sub">${d.bands[0].val} ${d.bands[0].val===1?'voto':'votos'}</div>
        </div>`:''}
      </div>`:''}
      ${d.vwCurve.length?`<div class="sec">Curva Van Westendorp</div>${vwChart(d.vwCurve)}`:''}
      <div class="sec">Modelo de cobrança preferido</div>
      ${barList(d.models,'#4ECDC4',d.n)}
      ${d.urgencies.length?`<div class="sec">Adicional por urgência aceito</div>${barList(d.urgencies,'#4ECDC4',d.n)}`:''}
    </div>

    <div class="divider"><div class="div-line"></div><div class="div-label">Cliente ideal e próximos passos</div><div class="div-line"></div></div>

    <!-- ══ 5 ══ -->
    <div class="card">
      <div class="card-head">
        <div class="block-badge" style="background:${B[5].badge};color:${B[5].badgeTx}">5</div>
        <div><div class="card-title">Quem é o cliente ideal?</div><div class="card-sub">Cruzamentos — onde concentrar energia</div></div>
      </div>
      <div class="narrative" style="border-color:${B[5].accent}">
        Células <strong>mais iluminadas</strong> = perfil com insegurança mais frequente.
        Priorize esses grupos para aquisição. Células <strong>cinzas</strong> = sem resposta nessa combinação.
      </div>
      <div class="sec">Perfil × Frequência de insegurança</div>
      ${heatMap(d.cross)}
      <div class="sec">Prazo aceitável para receber a resposta</div>
      ${barList(d.deadlines,'#FBBF24',d.n)}
    </div>

    <!-- ══ 6 ══ -->
    <div class="card">
      <div class="card-head">
        <div class="block-badge" style="background:${B[6].badge};color:${B[6].badgeTx}">6</div>
        <div><div class="card-title">O que fazer agora?</div><div class="card-sub">Pipeline e ação imediata</div></div>
      </div>
      ${v5}
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;background:var(--inset);border-radius:12px;padding:16px 20px;border:1px solid var(--border)">
        <div style="font-family:'Instrument Serif',serif;font-size:60px;line-height:1;letter-spacing:-2px;color:${B[6].accent};flex-shrink:0">${d.contacts.length}</div>
        <div style="border-left:1px solid var(--border2);padding-left:16px">
          <div style="font-size:22px;font-weight:600;color:var(--tx1);line-height:1">${contactPct}%</div>
          <div style="font-size:12px;color:var(--tx3);margin-top:3px">do total toparam conversar</div>
        </div>
      </div>
      <div class="sec">Intenção de uso</div>
      ${barList(d.intentions,'#F472B6',d.n)}
      ${d.indispens.length?`<div class="sec">O que tornaria o produto indispensável</div>
      <div class="quotes">${d.indispens.slice(0,3).map(w=>`<div class="quote">"${trunc(w,180)}"</div>`).join('')}</div>`:''}
      ${d.contacts.length?`
      <div class="sec">Pipeline de entrevistas — entre em contato</div>
      <div class="contact-list">${d.contacts.slice(0,8).map((c,i)=>{
        const initials=(c.contact||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
        const isPhone=/^[\d\s\(\)\-\+]+$/.test(c.contact.trim());
        const actionHref=isPhone
          ?`https://wa.me/55${c.contact.replace(/\D/g,'')}`
          :`mailto:${c.contact}`;
        const actionLabel=isPhone?'WhatsApp':'E-mail';
        return`<div class="contact-row">
          <div class="c-avatar" style="background:${B[6].badge};color:${B[6].badgeTx}">${initials||String(i+1)}</div>
          <div class="c-info">
            <div class="c-name">${c.contact}</div>
            <div class="c-role">${trunc(c.profile,36)}</div>
          </div>
          <div class="c-action">
            <a class="c-btn" href="${actionHref}" target="_blank">
              ${isPhone?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 5h18M3 12h18M3 19h18"/></svg>':'✉'}
              ${actionLabel}
            </a>
          </div>
        </div>`;
      }).join('')}</div>`:''}
    </div>

  </div>

  <div class="footer">
    <span>Segunda Opinião Radiológica · Natal, RN</span>
    <span>Atualização automática a cada 60s</span>
  </div>`;
}

function renderError(msg){
  document.getElementById('app').innerHTML=`<div class="state-center">
    <div class="state-title">Erro ao carregar</div>
    <div class="state-sub">${msg}</div>
    <button class="btn-refresh" style="margin-top:20px" onclick="fetchData()">↻ Tentar novamente</button>
  </div>`;
}

function fetchData(){
  Papa.parse(SHEET,{
    download:true,header:false,skipEmptyLines:true,
    complete:r=>{
      const d=parse(r);
      if(d){lastUpdate=new Date();render(d)}
      else renderError('Planilha sem dados ou formato inesperado');
    },
    error:e=>renderError(e.message||'CORS bloqueado — abra em servidor web (GitHub Pages)')
  });
}

fetchData();
setInterval(fetchData,REFRESH);
</script>
</body>
</html>
