<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Segunda Opinião Radiológica — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Backgrounds — 3 níveis distintos e perceptíveis */
  --page:   #0F1117;
  --card:   #181C26;
  --inset:  #1F2335;
  --hover:  #252A3A;

  /* Borders */
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);

  /* Text — todos passam 4.5:1 no fundo card */
  --tx1: #F1EEE9;   /* títulos, números hero */
  --tx2: #C8C3D0;   /* corpo de texto, labels principais */
  --tx3: #8A8496;   /* labels secundários */
  --tx4: #545060;   /* labels de eixo, hints */

  /* Accents — saturados o suficiente para brilhar no escuro */
  --blue:   #6B9FFF;
  --red:    #FF6B6B;
  --purple: #A78BFA;
  --teal:   #4ECDC4;
  --amber:  #FBBF24;
  --pink:   #F472B6;
  --green:  #4ADE80;

  /* Accent backgrounds (sutis) */
  --blue-bg:   rgba(107,159,255,0.10);
  --red-bg:    rgba(255,107,107,0.10);
  --purple-bg: rgba(167,139,250,0.10);
  --teal-bg:   rgba(78,205,196,0.10);
  --amber-bg:  rgba(251,191,36,0.10);
  --pink-bg:   rgba(244,114,182,0.10);
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--page);
  color:var(--tx2);
  min-height:100vh;
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
#app{display:flex;flex-direction:column;min-height:100vh}

/* ─── HEADER ─────────────────────────────────────── */
.hdr{
  background:rgba(15,17,23,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 36px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.hdr-logo{
  display:flex;align-items:center;gap:12px;
}
.hdr-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--teal);
  box-shadow:0 0 8px var(--teal);
  animation:glow 2.5s ease-in-out infinite;
}
@keyframes glow{0%,100%{opacity:1;box-shadow:0 0 8px var(--teal)}50%{opacity:.5;box-shadow:0 0 3px var(--teal)}}
.hdr-title{
  font-family:'Instrument Serif',serif;
  font-size:16px;color:var(--tx1);letter-spacing:.2px;
}
.hdr-sub{
  font-size:11px;color:var(--tx4);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;
}
.hdr-right{display:flex;align-items:center;gap:16px}
.hdr-badge{
  display:flex;align-items:center;gap:8px;
  background:var(--inset);border:1px solid var(--border2);
  border-radius:8px;padding:6px 14px;
}
.hdr-n{
  font-family:'Instrument Serif',serif;
  font-size:20px;font-weight:400;color:var(--tx1);line-height:1;
}
.hdr-nlabel{font-size:11px;color:var(--tx3);margin-top:1px}
.hdr-sep{width:1px;height:20px;background:var(--border2)}
.hdr-live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx3)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;animation:glow2 2s infinite}
@keyframes glow2{0%,100%{opacity:1}50%{opacity:.3}}
.btn-refresh{
  background:transparent;color:var(--tx3);
  border:1px solid var(--border2);border-radius:7px;
  padding:7px 14px;font-size:12px;font-weight:500;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;letter-spacing:.3px;
}
.btn-refresh:hover{background:var(--inset);color:var(--tx1);border-color:var(--border2)}

/* ─── GRID ────────────────────────────────────────── */
.grid{
  padding:28px 36px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  flex:1;
  align-items:start;
}

/* ─── DIVIDER ─────────────────────────────────────── */
.divider{
  grid-column:1/3;
  display:flex;align-items:center;gap:16px;
  padding:8px 0 4px;
}
.div-line{flex:1;height:1px;background:var(--border)}
.div-label{
  font-size:10px;color:var(--tx4);
  letter-spacing:2.5px;text-transform:uppercase;white-space:nowrap;
}

/* ─── CARD ────────────────────────────────────────── */
.card{
  background:var(--card);
  border-radius:16px;
  border:1px solid var(--border);
  padding:24px;
  display:flex;flex-direction:column;gap:0;
  transition:border-color .2s;
}
.card:hover{border-color:var(--border2)}

/* ─── CARD HEADER ─────────────────────────────────── */
.card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px}
.block-badge{
  width:26px;height:26px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;flex-shrink:0;margin-top:1px;
  font-family:'DM Sans',sans-serif;
}
.card-titles{}
.card-title{
  font-family:'Instrument Serif',serif;
  font-size:20px;color:var(--tx1);line-height:1.2;
}
.card-sub{font-size:12px;color:var(--tx4);margin-top:2px;font-weight:400}

/* ─── NARRATIVE ───────────────────────────────────── */
.narrative{
  background:var(--inset);
  border-radius:10px;
  padding:14px 16px;
  font-size:13px;color:var(--tx2);
  line-height:1.75;
  margin-bottom:20px;
  border-left:3px solid;
}
.narrative strong{color:var(--tx1);font-weight:600}

/* ─── SECTION LABEL ───────────────────────────────── */
.sec{
  font-size:10px;letter-spacing:1.5px;color:var(--tx4);
  text-transform:uppercase;font-weight:500;
  margin:16px 0 10px;
}

/* ─── KPI ROW ─────────────────────────────────────── */
.kpi-row{display:flex;gap:12px;margin-bottom:20px}
.kpi{
  flex:1;background:var(--inset);border-radius:10px;
  padding:14px 16px;border:1px solid var(--border);
}
.kpi-label{font-size:10px;letter-spacing:1px;color:var(--tx4);text-transform:uppercase;margin-bottom:6px;font-weight:500}
.kpi-val{font-family:'Instrument Serif',serif;font-size:34px;line-height:1;color:var(--tx1)}
.kpi-sub{font-size:11px;color:var(--tx3);margin-top:4px}

/* ─── HERO NUMBER ─────────────────────────────────── */
.hero{margin-bottom:6px}
.hero-num{
  font-family:'Instrument Serif',serif;
  font-size:72px;line-height:1;letter-spacing:-2px;
}
.hero-desc{font-size:13px;color:var(--tx3);margin-top:4px;margin-bottom:20px}

/* ─── BAR LIST ────────────────────────────────────── */
.bar-list{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-rank{
  font-size:10px;color:var(--tx4);
  width:20px;flex-shrink:0;text-align:right;
  font-weight:500;font-variant-numeric:tabular-nums;
}
.bar-label{
  font-size:12px;font-weight:500;color:var(--tx2);
  width:146px;min-width:146px;
  flex-shrink:0;text-align:right;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:default;
}
.bar-track{
  flex:1;height:8px;background:var(--inset);
  border-radius:4px;overflow:hidden;min-width:0;
}
.bar-fill{
  height:8px;border-radius:4px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
}
.bar-count{
  font-size:12px;font-weight:600;color:var(--tx1);
  width:24px;text-align:right;flex-shrink:0;
  font-variant-numeric:tabular-nums;
}

/* ─── QUOTES ──────────────────────────────────────── */
.quotes{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.quote{
  background:var(--inset);border-radius:8px;
  padding:12px 14px;
  font-size:12px;font-style:italic;color:var(--tx2);
  line-height:1.7;border-left:3px solid var(--border2);
}
.quote strong{font-style:normal;color:var(--tx1);font-weight:500}

/* ─── INSIGHT PILL ────────────────────────────────── */
.ipill{
  display:inline-flex;align-items:center;gap:8px;
  border-radius:8px;padding:8px 14px;
  font-size:12px;font-weight:500;
  margin-bottom:16px;border:1px solid;
  max-width:100%;overflow:hidden;
}
.ipill-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ─── CONTACTS ────────────────────────────────────── */
.contact-list{display:flex;flex-direction:column;gap:1px;margin-top:4px}
.contact-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:8px;
  transition:background .15s;cursor:default;
}
.contact-row:hover{background:var(--hover)}
.c-avatar{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;flex-shrink:0;
}
.c-name{font-size:12px;font-weight:500;color:var(--tx2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-tag{
  font-size:10px;color:var(--tx4);
  background:var(--inset);padding:3px 8px;border-radius:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;
}

/* ─── HEATMAP ─────────────────────────────────────── */
.heat-wrap{overflow-x:auto;margin-top:4px}
.heat-table{border-collapse:separate;border-spacing:3px;width:100%}
.heat-th{
  font-size:9px;letter-spacing:1px;color:var(--tx4);text-transform:uppercase;
  text-align:center;padding:4px 6px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:80px;
}
.heat-td-label{
  font-size:11px;font-weight:500;color:var(--tx2);
  padding:4px 8px 4px 0;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:120px;cursor:default;
}
.heat-cell{
  border-radius:6px;padding:4px 8px;
  font-size:11px;font-weight:600;
  text-align:center;min-width:30px;display:inline-block;
  transition:transform .1s;
}

/* ─── VW CHART ────────────────────────────────────── */
.vw-wrap{height:110px;position:relative;margin:4px 0 8px}
.vw-svg{width:100%;height:100%}
.vw-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:4px}
.vw-leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--tx3)}
.vw-line{width:16px;height:2px;border-radius:1px;flex-shrink:0}

/* ─── LOADING / ERROR ─────────────────────────────── */
.state-center{
  height:100vh;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:12px;
}
.state-title{font-family:'Instrument Serif',serif;font-size:18px;color:var(--tx2)}
.state-sub{font-size:12px;color:var(--tx4);letter-spacing:.3px}
.state-spinner{
  width:32px;height:32px;border-radius:50%;
  border:2px solid var(--border2);border-top-color:var(--blue);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── FOOTER ──────────────────────────────────────── */
.footer{
  padding:14px 36px;display:flex;justify-content:space-between;
  font-size:10px;color:var(--tx4);letter-spacing:1px;text-transform:uppercase;
  border-top:1px solid var(--border);background:var(--page);
}

/* ─── SCROLLBAR (webkit) ──────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--page)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--tx4)}
</style>
</head>
<body>
<div id="app">
  <div class="state-center">
    <div class="state-spinner"></div>
    <div class="state-title">Carregando dados</div>
    <div class="state-sub">Conectando ao Google Sheets…</div>
  </div>
</div>

<script>
const SHEET = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRIqIG3zTLcnsJsXQ3BLpAEdOyE4qbwdPptdX5K2oK2iko11XhNDQnK4Ea3kU0j1IUJG5I7WaMD5F4y/pub?output=csv";
const REFRESH = 60000;
let lastUpdate = null;

/* ── CONFIG DE COR POR BLOCO ── */
const B = {
  1: { accent:'var(--blue)',   bg:'var(--blue-bg)',   badge:'rgba(107,159,255,.15)', badgeTx:'#6B9FFF' },
  2: { accent:'var(--red)',    bg:'var(--red-bg)',    badge:'rgba(255,107,107,.15)', badgeTx:'#FF6B6B' },
  3: { accent:'var(--purple)', bg:'var(--purple-bg)', badge:'rgba(167,139,250,.15)', badgeTx:'#A78BFA' },
  4: { accent:'var(--teal)',   bg:'var(--teal-bg)',   badge:'rgba(78,205,196,.15)',  badgeTx:'#4ECDC4' },
  5: { accent:'var(--amber)',  bg:'var(--amber-bg)',  badge:'rgba(251,191,36,.15)',  badgeTx:'#FBBF24' },
  6: { accent:'var(--pink)',   bg:'var(--pink-bg)',   badge:'rgba(244,114,182,.15)', badgeTx:'#F472B6' },
};

/* ── UTILS ── */
function col(H, kw) {
  const i = H.findIndex(h => h && h.toLowerCase().includes(kw.toLowerCase()));
  return i >= 0 ? i : -1;
}
function colOr(H, ...kws) {
  for (const k of kws) { const i = col(H, k); if (i >= 0) return i; }
  return -1;
}
function trunc(s, max) {
  if (!s) return '';
  return s.length > max ? s.slice(0, max - 1) + '…' : s;
}
function pct(n, total) { return total > 0 ? Math.round(n / total * 100) : 0; }

/* Conta valores — strings longas (>55 chars) não são splittadas */
function countVals(records, idx) {
  if (idx < 0) return [];
  const m = {};
  records.forEach(r => {
    const v = (r[idx] || '').trim();
    if (!v) return;
    const parts = v.length > 55 ? [v] : v.split(/[;,]/).map(s => s.trim()).filter(Boolean);
    parts.forEach(k => { m[k] = (m[k] || 0) + 1; });
  });
  return Object.entries(m).map(([name, val]) => ({ name, val })).sort((a, b) => b.val - a.val);
}

/* Normaliza perfil: agrupa respostas de múltipla-escolha longas */
function normProf(s) {
  if (!s) return '';
  s = s.trim();
  if ((s.match(/,/g) || []).length >= 2) return s.split(',')[0].trim() + '…';
  return s;
}

/* ── PARSE ── */
function parse(csvData) {
  const rows = csvData.data;
  if (!rows || rows.length < 2) return null;
  const H = rows[0];
  const R = rows.slice(1).filter(r => r.some(c => c && c.trim()));
  if (!R.length) return null;

  const I = {
    profile:  colOr(H, 'perfil médico', 'perfil'),
    env:      colOr(H, 'ambiente'),
    grad:     colOr(H, 'graduação', 'preparou'),
    freq:     colOr(H, 'inseguro', 'frequência'),
    exams:    colOr(H, 'tipos de exame'),
    behav:    colOr(H, 'costuma fazer', 'dúvida sobre um exame'),
    worry:    colOr(H, 'preocupação'),
    caseImp:  colOr(H, 'opinião adicional', 'conduta'),
    action:   colOr(H, 'diante da dúvida'),
    desc:     colOr(H, 'brevemente', 'Descreva'),
    resolved: colOr(H, 'resolveu'),
    vw1:      colOr(H, 'tão barato'),
    vw2:      colOr(H, 'barato, mas', 'barato'),
    vw3:      colOr(H, 'caro, mas'),
    vw4:      colOr(H, 'tão caro'),
    band:     colOr(H, 'faixa melhor', 'faixa'),
    deadline: colOr(H, 'prazo'),
    urgency:  colOr(H, 'pagar a mais', 'urgente'),
    model:    colOr(H, 'cobrança'),
    intent:   colOr(H, 'disponível hoje', 'plataforma estivesse'),
    indisp:   colOr(H, 'indispensável'),
    interv:   colOr(H, 'entrevista'),
    contact:  colOr(H, 'contato'),
  };

  const n = R.length;

  // Perfis — agrupa por nome normalizado
  const pm = {};
  R.forEach(r => {
    const k = normProf((r[I.profile] || '').trim());
    if (k) pm[k] = (pm[k] || 0) + 1;
  });
  const profiles = Object.entries(pm).map(([name, val]) => ({ name, val })).sort((a, b) => b.val - a.val);

  const envs      = countVals(R, I.env);
  const gradNums  = R.map(r => parseFloat(r[I.grad])).filter(v => !isNaN(v));
  const avgGrad   = gradNums.length ? (gradNums.reduce((a, b) => a + b) / gradNums.length).toFixed(1) : null;
  const freqHigh  = R.filter(r => { const v = (r[I.freq] || '').toLowerCase(); return v.includes('semana') || v.includes('diariamente') || v.includes('diário'); }).length;
  const caseYes   = R.filter(r => (r[I.caseImp] || '').toLowerCase().includes('sim')).length;
  const exams     = countVals(R, I.exams);
  const worries   = R.map(r => (r[I.worry] || '').trim()).filter(Boolean);
  const behaviors = countVals(R, I.behav);
  const actions   = countVals(R, I.action);
  const stories   = R.map(r => ({
    desc: (r[I.desc] || '').trim(),
    prof: normProf((r[I.profile] || '').trim()),
  })).filter(s => s.desc);

  const vw1 = R.map(r => parseFloat(r[I.vw1])).filter(v => !isNaN(v)).sort((a, b) => a - b);
  const vw2 = R.map(r => parseFloat(r[I.vw2])).filter(v => !isNaN(v)).sort((a, b) => a - b);
  const vw3 = R.map(r => parseFloat(r[I.vw3])).filter(v => !isNaN(v)).sort((a, b) => a - b);
  const vw4 = R.map(r => parseFloat(r[I.vw4])).filter(v => !isNaN(v)).sort((a, b) => a - b);

  const optPrice = (vw2.length && vw3.length)
    ? 'R$' + Math.round((vw2[Math.floor(vw2.length / 2)] + vw3[Math.floor(vw3.length / 2)]) / 2)
    : null;

  const vwCurve = [];
  if (vw1.length && vw4.length) {
    const all = [...vw1, ...vw2, ...vw3, ...vw4].sort((a, b) => a - b);
    const mn = all[0], mx = all[all.length - 1];
    const step = Math.max(5, Math.round((mx - mn) / 12));
    for (let p = mn; p <= mx; p += step) {
      vwCurve.push({
        p,
        d1: pct(vw1.filter(v => v >= p).length, vw1.length),
        d2: pct(vw2.filter(v => v <= p).length, vw2.length),
        d3: pct(vw3.filter(v => v <= p).length, vw3.length),
        d4: pct(vw4.filter(v => v <= p).length, vw4.length),
      });
    }
  }

  const bands     = countVals(R, I.band);
  const deadlines = countVals(R, I.deadline);
  const urgencies = countVals(R, I.urgency);
  const models    = countVals(R, I.model);

  // Cross com perfis normalizados
  const cross = {};
  R.forEach(r => {
    const p = normProf((r[I.profile] || '').trim());
    const f = trunc((r[I.freq] || '').trim(), 24);
    if (!p || !f) return;
    if (!cross[p]) cross[p] = {};
    cross[p][f] = (cross[p][f] || 0) + 1;
  });

  const intentions = countVals(R, I.intent);
  const indispens  = R.map(r => (r[I.indisp] || '').trim()).filter(Boolean);
  const contacts   = R
    .filter(r => (r[I.interv] || '').toLowerCase().includes('sim'))
    .map(r => ({ contact: (r[I.contact] || '').trim(), profile: normProf((r[I.profile] || '').trim()) }));

  return { n, profiles, envs, avgGrad, freqHigh, caseYes, exams, worries, behaviors, actions, stories, vw1, vw2, vw3, vw4, vwCurve, optPrice, bands, deadlines, urgencies, models, cross, intentions, indispens, contacts };
}

/* ── RENDER HELPERS ── */

function empty() {
  return `<div style="padding:12px 0;font-size:12px;font-style:italic;color:var(--tx4)">Sem dados suficientes ainda</div>`;
}

/* Barra com cor sólida p/ top 1, opacidade menor p/ demais */
function barList(items, accentHex, max) {
  if (!items || !items.length) return empty();
  const top    = items.slice(0, 7);
  const maxVal = max || Math.max(...top.map(i => i.val), 1);
  return `<div class="bar-list">${top.map((item, idx) => {
    const ratio   = item.val / maxVal;
    const opacity = idx === 0 ? 1 : idx === 1 ? 0.65 : 0.38;
    // Parse hex para rgba
    const fillColor = accentHex.startsWith('#') ? hexRgba(accentHex, opacity) : accentHex;
    return `
    <div class="bar-row">
      <div class="bar-rank">${String(idx + 1).padStart(2, '0')}</div>
      <div class="bar-label" title="${item.name}">${trunc(item.name, 28)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(ratio * 100)}%;background:${fillColor}"></div>
      </div>
      <div class="bar-count">${item.val}</div>
    </div>`;
  }).join('')}</div>`;
}

function hexRgba(hex, a) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${a})`;
}

/* Gráfico VW */
function vwChart(curve) {
  if (!curve.length) return '';
  const W = 560, H = 100, PT = 10, PB = 20;
  const cH = H - PT - PB;
  const prices = curve.map(p => p.p);
  const minP = prices[0], maxP = prices[prices.length - 1];
  const xf = p => (p - minP) / (maxP - minP || 1) * W;
  const yf = v => PT + (1 - v / 100) * cH;
  const path = (key, color, dash) => {
    const d = curve.map((pt, i) => (i === 0 ? 'M' : 'L') + xf(pt.p).toFixed(1) + ' ' + yf(pt[key]).toFixed(1)).join(' ');
    return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" ${dash ? 'stroke-dasharray="5,3"' : ''} stroke-linecap="round" stroke-linejoin="round"/>`;
  };
  const labels = prices.filter((_, i) => i % 2 === 0);
  return `<div class="vw-wrap">
    <svg viewBox="0 0 ${W} ${H}" class="vw-svg" preserveAspectRatio="none">
      ${path('d1', '#FF6B6B', true)}
      ${path('d2', '#4ADE80', false)}
      ${path('d3', '#FBBF24', false)}
      ${path('d4', '#994444', true)}
      ${labels.map(p => `<text x="${xf(p).toFixed(1)}" y="${H}" font-size="9" fill="var(--tx4)" text-anchor="middle" font-family="'DM Sans',sans-serif">R$${p}</text>`).join('')}
    </svg>
  </div>
  <div class="vw-legend">
    <div class="vw-leg"><div class="vw-line" style="background:#FF6B6B"></div>Barato demais</div>
    <div class="vw-leg"><div class="vw-line" style="background:#4ADE80"></div>Aceitável</div>
    <div class="vw-leg"><div class="vw-line" style="background:#FBBF24"></div>Caro mas paga</div>
    <div class="vw-leg"><div class="vw-line" style="background:#994444"></div>Caro demais</div>
  </div>`;
}

/* Heatmap */
function heatMap(cross) {
  const profs = Object.keys(cross);
  const freqs = [...new Set(Object.values(cross).flatMap(v => Object.keys(v)))];
  if (!profs.length) return empty();
  return `<div class="heat-wrap"><table class="heat-table">
    <thead><tr>
      <th style="text-align:left;min-width:110px"></th>
      ${freqs.map(f => `<th class="heat-th" title="${f}">${trunc(f, 14)}</th>`).join('')}
    </tr></thead>
    <tbody>${profs.map(prof => `<tr>
      <td class="heat-td-label" title="${prof}">${trunc(prof, 22)}</td>
      ${freqs.map(f => {
        const v  = cross[prof][f] || 0;
        const mx = Math.max(...freqs.map(ff => cross[prof][ff] || 0), 1);
        const o  = v / mx;
        const bg = v ? `rgba(251,191,36,${(o * 0.6 + 0.1).toFixed(2)})` : 'var(--inset)';
        const tc = o > 0.5 ? '#0F1117' : 'var(--tx2)';
        return `<td style="text-align:center">
          <div class="heat-cell" style="background:${bg};color:${tc}">${v || ''}</div>
        </td>`;
      }).join('')}
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderError(msg) {
  document.getElementById('app').innerHTML = `<div class="state-center">
    <div class="state-title">Erro ao carregar</div>
    <div class="state-sub">${msg}</div>
    <button class="btn-refresh" style="margin-top:20px" onclick="fetchData()">↻ Tentar novamente</button>
  </div>`;
}

function fetchData() {
  Papa.parse(SHEET, {
    download: true, header: false, skipEmptyLines: true,
    complete: r => {
      const d = parse(r);
      if (d) { lastUpdate = new Date(); render(d); }
      else renderError('Planilha sem dados ou formato inesperado');
    },
    error: e => renderError(e.message || 'CORS bloqueado — abra em servidor web (GitHub Pages)')
  });
}
