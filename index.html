<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Segunda Opinião Radiológica — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:     #111010;
  --bg2:    #161513;
  --bg3:    #1C1A18;
  --bg4:    #222020;
  --bd:     #2A2724;
  --bd2:    #1E1C1A;
  --t1:     #EDE8E0;
  --t2:     #C4BDB5;
  --t3:     #7A6F65;
  --t4:     #4A4540;
  --t5:     #2E2A26;
  --ac:     #E8D5A8;
  --ac2:    #A8C4B4;
  --red:    #C45040;
  --green:  #6A9E8A;
  --amber:  #C49040;
}

body{font-family:'Barlow Condensed',sans-serif;background:var(--bg);color:var(--t2);min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh}

.hdr{background:#0C0C0B;border-bottom:1px solid var(--bd2);padding:13px 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr-brand .hdr-title{font-family:'Libre Baskerville',serif;font-size:14px;font-weight:700;color:var(--t1);letter-spacing:.3px}
.hdr-brand .hdr-sub{font-size:10px;color:var(--t5);letter-spacing:2.5px;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:20px;font-size:10px;color:var(--t5)}
.hdr-n{font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700;color:var(--ac)}
.hdr-nlabel{font-size:10px;color:var(--t5);letter-spacing:1.5px;text-transform:uppercase;margin-left:3px}
.btn-r{background:transparent;color:var(--t4);border:1px solid var(--bd);border-radius:3px;padding:5px 13px;font-size:9px;font-weight:500;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase;transition:all .2s}
.btn-r:hover{border-color:var(--t3);color:var(--t2)}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--ac2);display:inline-block;margin-right:5px;animation:pl 2s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.15}}

.grid{padding:28px 36px;display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;align-items:start}

.divider{grid-column:1/3;display:flex;align-items:center;gap:18px;padding:4px 0}
.divider-line{flex:1;height:1px;background:var(--bd2)}
.divider-label{font-size:9px;color:var(--t5);letter-spacing:3px;text-transform:uppercase;white-space:nowrap}

.card{background:var(--bg2);border-radius:12px;padding:26px 28px;border:1px solid var(--bd2)}

.eyebrow{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px}
.bnum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.btitle{font-family:'Libre Baskerville',serif;font-size:19px;font-weight:700;color:var(--t1);line-height:1.1}
.bsub{font-size:11px;font-weight:400;color:var(--t4);letter-spacing:.3px;margin-top:2px}

.narrative{font-family:'Libre Baskerville',serif;font-size:12.5px;font-style:italic;color:var(--t3);line-height:1.85;border-bottom:1px solid var(--bd2);padding-bottom:18px;margin-bottom:18px}
.narrative strong{color:var(--t2);font-style:normal}

.hero-num{font-family:'Libre Baskerville',serif;font-size:64px;font-weight:700;line-height:1;letter-spacing:-3px}
.hero-unit{font-size:13px;color:var(--t4);letter-spacing:2px;text-transform:uppercase;margin-top:4px;margin-bottom:18px}

.kpi-row{display:flex;gap:0;margin-bottom:18px}
.kpi{flex:1;padding:13px 0;border-right:1px solid var(--bd2)}
.kpi:last-child{border-right:none;padding-left:16px}
.kpi:first-child{padding-right:16px}
.kpi-label{font-size:9px;letter-spacing:2px;color:var(--t5);text-transform:uppercase;margin-bottom:4px}
.kpi-val{font-family:'Libre Baskerville',serif;font-size:30px;font-weight:700;line-height:1}
.kpi-sub{font-size:10px;color:var(--t4);margin-top:3px}

.sec{font-size:9px;letter-spacing:3px;color:var(--t5);text-transform:uppercase;margin:16px 0 9px;display:flex;align-items:center;gap:12px}
.sec-line{flex:1;height:1px;background:var(--bd2)}

/* BARRAS — layout fixo para evitar quebra de labels */
.bar-list{display:flex;flex-direction:column;gap:5px}
.bar-row{display:flex;align-items:center;gap:8px;min-height:20px}
.bar-rank{font-size:10px;color:var(--t5);width:18px;flex-shrink:0;text-align:right;font-weight:500}
.bar-name{font-size:12px;font-weight:500;color:var(--t3);
  /* largura fixa — ESSENCIAL para não quebrar */
  width:152px;min-width:152px;max-width:152px;
  flex-shrink:0;text-align:right;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:default;letter-spacing:.2px;line-height:1}
.bar-track{flex:1;height:2px;background:var(--bg3);border-radius:2px;min-width:0}
.bar-fill{height:2px;border-radius:2px;transition:width .7s ease}
.bar-val{font-family:'Libre Baskerville',serif;font-size:13px;font-weight:700;color:var(--t2);width:22px;text-align:right;flex-shrink:0}

.quotes{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.quote{font-family:'Libre Baskerville',serif;font-size:11px;font-style:italic;color:var(--t3);line-height:1.75;padding:9px 13px;border-left:2px solid var(--bd);background:var(--bg3);border-radius:0 5px 5px 0}
.quote strong{font-style:normal;color:var(--t3)}

.ipill{display:inline-flex;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--bd);border-radius:3px;padding:5px 13px;font-size:11px;font-weight:500;letter-spacing:.5px;margin-bottom:13px;max-width:100%;overflow:hidden}
.ipill-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.contact-list{display:flex;flex-direction:column;gap:1px;margin-top:4px}
.contact-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd2)}
.contact-row:last-child{border-bottom:none}
.cavatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.cname{font-size:12px;color:var(--t3);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctag{font-size:9px;color:var(--t5);background:var(--bg3);padding:2px 7px;border-radius:3px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}

.heat-wrap{overflow-x:auto;margin-top:2px}
.heat-table{border-collapse:collapse;font-size:10px;width:100%}
.heat-th{text-align:center;padding:4px 5px;color:var(--t5);font-size:9px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.heat-td-l{padding:4px 8px 4px 0;color:var(--t3);font-weight:500;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;cursor:default}
.heat-cell{border-radius:4px;padding:3px 5px;font-size:10px;font-weight:700;min-width:26px;display:inline-block;text-align:center}

.vw-wrap{position:relative;height:100px;margin:4px 0 6px}
.vw-svg{width:100%;height:100%}
.vw-legend{display:flex;gap:14px;flex-wrap:wrap}
.vw-leg{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--t3);letter-spacing:.3px}
.vw-line{width:14px;height:2px;border-radius:1px;flex-shrink:0}

.state-center{height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--t4)}
.state-title{font-family:'Libre Baskerville',serif;font-size:15px;color:var(--t3)}
.state-sub{font-size:11px;color:var(--t5);letter-spacing:.5px}

.footer{padding:13px 36px;display:flex;justify-content:space-between;font-size:9px;color:var(--t5);border-top:1px solid var(--bd2);background:#0C0C0B;letter-spacing:1.5px;text-transform:uppercase}
</style>
</head>
<body>
<div id="app">
  <div class="state-center">
    <div class="state-title">Carregando dados</div>
    <div class="state-sub">Conectando ao Google Sheets</div>
  </div>
</div>

<script>
const SHEET="https://docs.google.com/spreadsheets/d/e/2PACX-1vRIqIG3zTLcnsJsXQ3BLpAEdOyE4qbwdPptdX5K2oK2iko11XhNDQnK4Ea3kU0j1IUJG5I7WaMD5F4y/pub?output=csv";
const REFRESH=60000;
let lastUpdate=null;

const BC={
  1:{n:"#1A3A5C",t:"#6AABE0"},
  2:{n:"#3A1A1A",t:"#C45040"},
  3:{n:"#2A1A3A",t:"#9070C0"},
  4:{n:"#1A3A30",t:"#60A890"},
  5:{n:"#3A2A10",t:"#C09040"},
  6:{n:"#3A1A30",t:"#B06880"},
};

function col(H,kw){const i=H.findIndex(h=>h&&h.toLowerCase().includes(kw.toLowerCase()));return i>=0?i:-1}
function colOr(H,...kws){for(const k of kws){const i=col(H,k);if(i>=0)return i}return -1}

// Trunca mantendo texto original no title do elemento
function trunc(s,max=32){if(!s)return'';return s.length>max?s.substring(0,max-1)+'…':s}

// Conta valores separados por ; ou , APENAS se o valor for curto (respostas únicas longas não são splittadas)
function countValues(records,idx){
  if(idx<0)return[];
  const m={};
  records.forEach(r=>{
    const v=(r[idx]||"").trim();
    if(!v)return;
    // Strings longas (>50 chars) provavelmente são respostas únicas, não listas
    const parts=v.length>50?[v]:v.split(/[;,]/).map(s=>s.trim()).filter(Boolean);
    parts.forEach(k=>{if(k)m[k]=(m[k]||0)+1});
  });
  return Object.entries(m).map(([name,val])=>({name,val})).sort((a,b)=>b.val-a.val);
}

function pct(n,total){return total>0?Math.round(n/total*100):0}

// Normaliza perfil: quebra respostas longas de múltipla escolha em nome curto
function normProfile(s){
  if(!s)return'';
  s=s.trim();
  // Respostas que listam especialidades separadas por vírgula ficam como a primeira + "..."
  if((s.match(/,/g)||[]).length>=2)return s.split(',')[0].trim()+'…';
  return s;
}

function parse(csvData){
  const rows=csvData.data;
  if(!rows||rows.length<2)return null;
  const H=rows[0];
  const R=rows.slice(1).filter(r=>r.some(c=>c&&c.trim()));
  if(!R.length)return null;

  const I={
    profile: colOr(H,"perfil médico","perfil"),
    env:     colOr(H,"ambiente"),
    grad:    colOr(H,"graduação","preparou"),
    freq:    colOr(H,"inseguro","frequência"),
    exams:   colOr(H,"tipos de exame"),
    behav:   colOr(H,"costuma fazer","dúvida sobre um exame"),
    worry:   colOr(H,"preocupação"),
    caseImp: colOr(H,"opinião adicional","conduta"),
    action:  colOr(H,"diante da dúvida"),
    desc:    colOr(H,"brevemente","Descreva"),
    resolved:colOr(H,"resolveu"),
    vw1:     colOr(H,"tão barato"),
    vw2:     colOr(H,"barato, mas","barato"),
    vw3:     colOr(H,"caro, mas"),
    vw4:     colOr(H,"tão caro"),
    band:    colOr(H,"faixa melhor","faixa"),
    deadline:colOr(H,"prazo"),
    urgency: colOr(H,"pagar a mais","urgente"),
    model:   colOr(H,"cobrança"),
    intent:  colOr(H,"disponível hoje","plataforma estivesse"),
    indisp:  colOr(H,"indispensável"),
    interv:  colOr(H,"entrevista"),
    contact: colOr(H,"contato"),
  };

  const n=R.length;

  // Perfis: agrupa por nome normalizado
  const pm={};
  R.forEach(r=>{
    const raw=(r[I.profile]||"").trim();
    if(!raw)return;
    const k=normProfile(raw);
    pm[k]=(pm[k]||0)+1;
  });
  const profiles=Object.entries(pm).map(([name,val])=>({name,val})).sort((a,b)=>b.val-a.val);

  const envs=countValues(R,I.env);
  const gradNums=R.map(r=>parseFloat(r[I.grad])).filter(v=>!isNaN(v));
  const avgGrad=gradNums.length?(gradNums.reduce((a,b)=>a+b,0)/gradNums.length).toFixed(1):null;
  const freqHigh=R.filter(r=>{const v=(r[I.freq]||"").toLowerCase();return v.includes("semana")||v.includes("diariamente")||v.includes("diário")}).length;
  const caseYes=R.filter(r=>(r[I.caseImp]||"").toLowerCase().includes("sim")).length;
  const exams=countValues(R,I.exams);
  const worries=R.map(r=>(r[I.worry]||"").trim()).filter(Boolean);
  const behaviors=countValues(R,I.behav);
  const actions=countValues(R,I.action);
  const stories=R.map(r=>({desc:(r[I.desc]||"").trim(),res:(r[I.resolved]||"").trim(),prof:normProfile((r[I.profile]||"").trim())})).filter(s=>s.desc);

  const vw1=R.map(r=>parseFloat(r[I.vw1])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
  const vw2=R.map(r=>parseFloat(r[I.vw2])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
  const vw3=R.map(r=>parseFloat(r[I.vw3])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
  const vw4=R.map(r=>parseFloat(r[I.vw4])).filter(v=>!isNaN(v)).sort((a,b)=>a-b);
  const bands=countValues(R,I.band);
  const deadlines=countValues(R,I.deadline);
  const urgencies=countValues(R,I.urgency);
  const models=countValues(R,I.model);

  const optPrice=(vw2.length&&vw3.length)?"R$"+Math.round((vw2[Math.floor(vw2.length/2)]+vw3[Math.floor(vw3.length/2)])/2):null;

  const vwCurve=[];
  if(vw1.length&&vw4.length){
    const all=[...vw1,...vw2,...vw3,...vw4].sort((a,b)=>a-b);
    const mn=all[0],mx=all[all.length-1],step=Math.max(5,Math.round((mx-mn)/12));
    for(let p=mn;p<=mx;p+=step){
      vwCurve.push({p,
        d1:pct(vw1.filter(v=>v>=p).length,vw1.length),
        d2:pct(vw2.filter(v=>v<=p).length,vw2.length),
        d3:pct(vw3.filter(v=>v<=p).length,vw3.length),
        d4:pct(vw4.filter(v=>v<=p).length,vw4.length)
      });
    }
  }

  // Cross com perfis normalizados
  const cross={};
  R.forEach(r=>{
    const p=normProfile((r[I.profile]||"").trim());
    const f=trunc((r[I.freq]||"").trim(),22);
    if(!p||!f)return;
    if(!cross[p])cross[p]={};
    cross[p][f]=(cross[p][f]||0)+1;
  });

  const intentions=countValues(R,I.intent);
  const indispens=R.map(r=>(r[I.indisp]||"").trim()).filter(Boolean);
  const contacts=R.filter(r=>(r[I.interv]||"").toLowerCase().includes("sim"))
    .map(r=>({contact:(r[I.contact]||"").trim(),profile:normProfile((r[I.profile]||"").trim())}));

  return{n,profiles,envs,avgGrad,freqHigh,caseYes,exams,worries,behaviors,actions,stories,vw1,vw2,vw3,vw4,vwCurve,optPrice,bands,deadlines,urgencies,models,cross,intentions,indispens,contacts};
}

// --- COMPONENTES HTML ---

function barList(items,accent,max){
  if(!items||!items.length)return`<div style="font-size:11px;color:var(--t5);padding:8px 0;font-style:italic;font-family:'Libre Baskerville',serif">Sem dados suficientes</div>`;
  const top=items.slice(0,7);
  const maxVal=max||Math.max(...top.map(i=>i.val),1);
  return`<div class="bar-list">${top.map((item,idx)=>`
    <div class="bar-row">
      <div class="bar-rank">${String(idx+1).padStart(2,'0')}</div>
      <div class="bar-name" title="${item.name}">${trunc(item.name,30)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(item.val/maxVal*100)}%;background:${idx===0?accent:idx===1?accent+'AA':'var(--bd)'}"></div>
      </div>
      <div class="bar-val">${item.val}</div>
    </div>`).join('')}</div>`;
}

function vwChart(curve){
  if(!curve.length)return'';
  const W=560,H=88,PL=0,PT=8,PB=18;
  const cW=W-PL,cH=H-PT-PB;
  const prices=curve.map(p=>p.p);
  const minP=prices[0],maxP=prices[prices.length-1];
  const x=p=>PL+(p-minP)/(maxP-minP||1)*cW;
  const y=v=>PT+(1-v/100)*cH;
  const path=(key,color,dash)=>{
    const d=curve.map((pt,i)=>(i===0?'M':'L')+x(pt.p).toFixed(1)+' '+y(pt[key]).toFixed(1)).join(' ');
    return`<path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" ${dash?'stroke-dasharray="4,3"':''} stroke-linecap="round" stroke-linejoin="round"/>`;
  };
  const labels=prices.filter((_,i)=>i%2===0);
  return`<div class="vw-wrap">
    <svg viewBox="0 0 ${W} ${H}" class="vw-svg">
      ${path('d1','var(--red)',true)}
      ${path('d2','var(--green)',false)}
      ${path('d3','var(--amber)',false)}
      ${path('d4','#7A4030',true)}
      ${labels.map(p=>`<text x="${x(p).toFixed(1)}" y="${H}" font-size="9" fill="var(--t5)" text-anchor="middle" font-family="'Barlow Condensed',sans-serif">R$${p}</text>`).join('')}
    </svg>
  </div>
  <div class="vw-legend">
    <div class="vw-leg"><div class="vw-line" style="background:var(--red)"></div>Barato demais</div>
    <div class="vw-leg"><div class="vw-line" style="background:var(--green)"></div>Aceitável</div>
    <div class="vw-leg"><div class="vw-line" style="background:var(--amber)"></div>Caro mas paga</div>
    <div class="vw-leg"><div class="vw-line" style="background:#7A4030"></div>Caro demais</div>
  </div>`;
}

function heatMap(cross){
  const profs=Object.keys(cross);
  const freqs=[...new Set(Object.values(cross).flatMap(v=>Object.keys(v)))];
  if(!profs.length)return`<div style="font-size:11px;color:var(--t5);padding:8px 0;font-style:italic;font-family:'Libre Baskerville',serif">Dados insuficientes</div>`;
  return`<div class="heat-wrap"><table class="heat-table">
    <thead><tr>
      <th style="text-align:left;min-width:110px"></th>
      ${freqs.map(f=>`<th class="heat-th" title="${f}">${trunc(f,16)}</th>`).join('')}
    </tr></thead>
    <tbody>${profs.map(prof=>`<tr>
      <td class="heat-td-l" title="${prof}">${trunc(prof,22)}</td>
      ${freqs.map(f=>{
        const v=cross[prof][f]||0;
        const mx=Math.max(...freqs.map(ff=>cross[prof][ff]||0),1);
        const o=v/mx;
        const bg=v?`rgba(196,175,130,${Math.max(o*0.7,0.08)})`:'transparent';
        const tc=o>0.55?'var(--bg)':'var(--t3)';
        return`<td style="text-align:center;padding:3px"><div class="heat-cell" style="background:${bg};color:${tc}">${v||''}</div></td>`;
      }).join('')}
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// --- RENDER PRINCIPAL ---
function render(d){
  const now=lastUpdate?lastUpdate.toLocaleTimeString("pt-BR"):"";

  document.getElementById("app").innerHTML=`
  <div class="hdr">
    <div class="hdr-brand">
      <div class="hdr-title">Segunda Opinião Radiológica</div>
      <div class="hdr-sub">Dashboard de Validação</div>
    </div>
    <div class="hdr-right">
      <div><span class="hdr-n">${d.n}</span><span class="hdr-nlabel">${d.n===1?'resposta':'respostas'}</span></div>
      <span><span class="pulse"></span>${now||'ao vivo'}</span>
      <button class="btn-r" onclick="fetchData()">↻ Atualizar</button>
    </div>
  </div>

  <div class="grid">

    <!-- BLOCO 1 -->
    <div class="card">
      <div class="eyebrow">
        <div class="bnum" style="background:${BC[1].n};color:${BC[1].t}">1</div>
        <div><div class="btitle">Quem está respondendo?</div><div class="bsub">Filtro de qualidade — se são os médicos certos, o resto vale</div></div>
      </div>
      <div class="narrative">
        <strong>${d.n} ${d.n===1?'médico respondeu':'médicos responderam'}</strong> até agora.
        Perfil dominante: <strong>${d.profiles[0]?.name||'—'}</strong>${d.envs[0]?`. Ambiente principal: <strong>${trunc(d.envs[0].name,28)}</strong>`:'.'}.
      </div>
      <div class="sec">Perfil médico <div class="sec-line"></div></div>
      ${barList(d.profiles,BC[1].t)}
      <div class="sec">Ambiente de atuação <div class="sec-line"></div></div>
      ${barList(d.envs,BC[1].t)}
    </div>

    <!-- BLOCO 2 -->
    <div class="card">
      <div class="eyebrow">
        <div class="bnum" style="background:${BC[2].n};color:${BC[2].t}">2</div>
        <div><div class="btitle">A dor é real?</div><div class="bsub">Se o número for alto, o projeto faz sentido</div></div>
      </div>
      <div class="narrative">
        <strong>${pct(d.freqHigh,d.n)}% dos médicos</strong> sentem insegurança ao interpretar imagens toda semana ou todos os dias — e <strong>${pct(d.caseYes,d.n)}%</strong> relataram um caso em que isso impactou diretamente a conduta.
      </div>
      <div class="kpi-row">
        <div class="kpi">
          <div class="kpi-label">Frequência alta</div>
          <div class="kpi-val" style="color:${BC[2].t}">${pct(d.freqHigh,d.n)}<span style="font-size:15px;color:var(--t5)">%</span></div>
          <div class="kpi-sub">toda semana ou diariamente</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Impacto real</div>
          <div class="kpi-val" style="color:var(--ac2)">${pct(d.caseYes,d.n)}<span style="font-size:15px;color:var(--t5)">%</span></div>
          <div class="kpi-sub">relataram caso direto</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Graduação</div>
          <div class="kpi-val" style="color:var(--ac)">${d.avgGrad||'—'}<span style="font-size:15px;color:var(--t5)">/5</span></div>
          <div class="kpi-sub">média dos respondentes</div>
        </div>
      </div>
      <div class="sec">Exames que mais geram dúvida <div class="sec-line"></div></div>
      ${barList(d.exams,BC[2].t)}
      ${d.worries.length?`
      <div class="sec">Em suas palavras <div class="sec-line"></div></div>
      <div class="quotes">${d.worries.slice(0,2).map(w=>`<div class="quote">"${trunc(w,160)}"</div>`).join('')}</div>`:''}
    </div>

    <div class="divider"><div class="divider-line"></div><div class="divider-label">Como resolvem hoje</div><div class="divider-line"></div></div>

    <!-- BLOCO 3 -->
    <div class="card">
      <div class="eyebrow">
        <div class="bnum" style="background:${BC[3].n};color:${BC[3].t}">3</div>
        <div><div class="btitle">O que fazem hoje?</div><div class="bsub">Concorrência real — o mais marcado é quem você precisa superar</div></div>
      </div>
      ${d.behaviors.length?`
      <div class="narrative">
        A solução atual mais usada é <strong>${trunc(d.behaviors[0]?.name||'—',36)}</strong>${d.behaviors[1]?`, seguida de <strong>${trunc(d.behaviors[1].name,28)}</strong>`:''}. É aí que seu produto precisa ser melhor.
      </div>
      <div class="ipill" style="color:${BC[3].t};border-color:${BC[3].n}">
        <div class="pdot" style="background:${BC[3].t}"></div>
        <span class="ipill-label">Concorrente #1 — ${trunc(d.behaviors[0]?.name||'—',36)}</span>
      </div>`:''}
      <div class="sec">Como resolvem a dúvida <div class="sec-line"></div></div>
      ${barList(d.behaviors,BC[3].t)}
      ${d.actions.length?`
      <div class="sec">O que fizeram no último caso real <div class="sec-line"></div></div>
      ${barList(d.actions,BC[3].t)}`:''}
      ${d.stories.length?`
      <div class="sec">Relatos diretos <div class="sec-line"></div></div>
      <div class="quotes">${d.stories.slice(0,2).map(s=>`<div class="quote"><strong>${trunc(s.prof,24)}:</strong> "${trunc(s.desc,120)}"</div>`).join('')}</div>`:''}
    </div>

    <!-- BLOCO 4 -->
    <div class="card">
      <div class="eyebrow">
        <div class="bnum" style="background:${BC[4].n};color:${BC[4].t}">4</div>
        <div><div class="btitle">Quanto pagam?</div><div class="bsub">Precificação — defina antes de lançar</div></div>
      </div>
      ${d.optPrice?`
      <div class="narrative">
        O cruzamento Van Westendorp indica <strong>${d.optPrice}/caso</strong> como ponto ótimo. Abaixo disso gera desconfiança de qualidade; acima perde volume de conversão.
      </div>
      <div class="kpi-row">
        <div class="kpi">
          <div class="kpi-label">Preço ótimo</div>
          <div class="kpi-val" style="color:${BC[4].t}">${d.optPrice}</div>
          <div class="kpi-sub">por caso · VW</div>
        </div>
        ${d.bands[0]?`<div class="kpi">
          <div class="kpi-label">Faixa preferida</div>
          <div class="kpi-val" style="font-size:18px;color:var(--ac)">${trunc(d.bands[0]?.name||'—',14)}</div>
          <div class="kpi-sub">${d.bands[0].val} ${d.bands[0].val===1?'voto':'votos'}</div>
        </div>`:''}
      </div>`:`<div style="font-size:12px;color:var(--t4);padding:8px 0 16px;font-style:italic;font-family:'Libre Baskerville',serif">Dados insuficientes para calcular preço ideal</div>`}
      ${d.vwCurve.length?`
      <div class="sec">Curva Van Westendorp <div class="sec-line"></div></div>
      ${vwChart(d.vwCurve)}`:''}
      <div class="sec">Modelo de cobrança preferido <div class="sec-line"></div></div>
      ${barList(d.models,BC[4].t)}
      ${d.urgencies.length?`
      <div class="sec">Adicional por urgência <div class="sec-line"></div></div>
      ${barList(d.urgencies,BC[4].t)}`:''}
    </div>

    <div class="divider"><div class="divider-line"></div><div class="divider-label">Cliente ideal e próximos passos</div><div class="divider-line"></div></div>

    <!-- BLOCO 5 -->
    <div class="card">
      <div class="eyebrow">
        <div class="bnum" style="background:${BC[5].n};color:${BC[5].t}">5</div>
        <div><div class="btitle">Quem é o cliente ideal?</div><div class="bsub">Cruzamentos — onde concentrar energia</div></div>
      </div>
      <div class="narrative">
        O mapa abaixo cruza perfil e frequência de insegurança. <strong>Células mais iluminadas = maior prioridade</strong> para aquisição e entrevistas de discovery.
      </div>
      <div class="sec">Perfil × Frequência de insegurança <div class="sec-line"></div></div>
      ${heatMap(d.cross)}
      <div class="sec">Prazo aceitável para resposta <div class="sec-line"></div></div>
      ${barList(d.deadlines,BC[5].t)}
    </div>

    <!-- BLOCO 6 -->
    <div class="card">
      <div class="eyebrow">
        <div class="bnum" style="background:${BC[6].n};color:${BC[6].t}">6</div>
        <div><div class="btitle">O que fazer agora?</div><div class="bsub">Pipeline e ação imediata</div></div>
      </div>
      <div class="narrative">
        <strong>${d.contacts.length} médico${d.contacts.length!==1?'s':''}</strong> toparam conversar — <strong>${pct(d.contacts.length,d.n)}% do total</strong>. Cada nome abaixo é uma entrevista de discovery esperando acontecer.
      </div>
      <div class="kpi-row">
        <div class="kpi">
          <div class="kpi-label">Toparam conversar</div>
          <div class="kpi-val" style="color:${BC[6].t}">${d.contacts.length}</div>
          <div class="kpi-sub">${pct(d.contacts.length,d.n)}% do total de respostas</div>
        </div>
      </div>
      <div class="sec">Intenção de uso <div class="sec-line"></div></div>
      ${barList(d.intentions,BC[6].t)}
      ${d.indispens.length?`
      <div class="sec">O que tornaria indispensável <div class="sec-line"></div></div>
      <div class="quotes">${d.indispens.slice(0,3).map(w=>`<div class="quote">"${trunc(w,160)}"</div>`).join('')}</div>`:''}
      ${d.contacts.length?`
      <div class="sec">Pipeline de entrevistas <div class="sec-line"></div></div>
      <div class="contact-list">
        ${d.contacts.slice(0,8).map(c=>`
          <div class="contact-row">
            <div class="cavatar" style="background:${BC[6].n};color:${BC[6].t}">${(c.contact||'?')[0].toUpperCase()}</div>
            <div class="cname">${c.contact}</div>
            <div class="ctag" title="${c.profile}">${trunc(c.profile,22)}</div>
          </div>`).join('')}
      </div>`:''}
    </div>

  </div>

  <div class="footer">
    <span>Segunda Opinião Radiológica · Natal, RN</span>
    <span>Google Forms · atualização a cada 60s</span>
  </div>`;
}

function renderError(msg){
  document.getElementById("app").innerHTML=`<div class="state-center">
    <div class="state-title">Erro ao carregar</div>
    <div class="state-sub">${msg}</div>
    <button class="btn-r" style="margin-top:18px" onclick="fetchData()">Tentar novamente</button>
  </div>`;
}

function fetchData(){
  Papa.parse(SHEET,{
    download:true,header:false,skipEmptyLines:true,
    complete:(r)=>{
      const d=parse(r);
      if(d){lastUpdate=new Date();render(d);}
      else renderError("Planilha sem dados ou formato inesperado");
    },
    error:(e)=>renderError(e.message||"CORS bloqueado — abra em servidor web (GitHub Pages)")
  });
}

fetchData();
setInterval(fetchData,REFRESH);
</script>
</body>
</html>
